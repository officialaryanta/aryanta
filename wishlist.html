<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aryanta | My Wishlist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background-color: var(--bg-color);">

    <header class="top-bar glass-effect">
        <div class="nav-left">
            <div class="menu-trigger" onclick="openSidebar()"><i class="fas fa-bars-staggered"></i></div>
            <div class="brand-logo" onclick="location.href='index.html'">ARYANTA<span class="prime-dot">.</span></div>
        </div>
        
        <div class="nav-actions">
            <div class="cart-icon" onclick="location.href='index.html'">
                <i class="fas fa-home" style="font-size: 20px; color: var(--text-main);"></i>
            </div>
            <div class="cart-icon" onclick="location.href='index.html'">
                <i class="fas fa-shopping-bag" style="font-size: 20px; color: var(--text-main);"></i>
            </div>
        </div>
    </header>

    <aside class="side-panel" id="sidebar">
        <div class="panel-header">
            <div class="user-profile">
                <div style="position: relative;">
                    <img id="sidebarAvatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Guest" alt="avatar" class="avatar-img">
                </div>
                <div class="user-greeting">
                    <span id="sidebarUser">Welcome Guest</span>
                    <small id="sidebarRole">Store Member</small>
                </div>
            </div>
        </div>
        <nav class="panel-links">
            <a href="index.html" class="stagger-link"><i class="fas fa-compass"></i> Discover</a>
            <a href="wishlist.html" style="color: var(--primary); background: var(--bg-color);"><i class="fas fa-heart"></i> My Wishlist</a>
            <a href="track.html"><i class="fas fa-box-open"></i> My Orders</a>
            <a href="warrenty.html"><i class="fas fa-shield-alt"></i> Claim Warranty</a>
            <a href="sellerpanlevurification.html"><i class="fas fa-store"></i> Sell on Our Platform</a>
            <a href="support.html"><i class="fas fa-headset"></i> Support</a>
        </nav>
    </aside>

    <div class="dimmer" id="overlay" onclick="closeSidebar()"></div>

    <main class="main-content" style="padding-top: 40px; padding-bottom: 80px;">
        <div style="max-width: 1200px; margin: 0 auto; padding: 0 5%; width: 100%;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <h2 style="font-size: 28px; font-weight: 800;">My Wishlist <i class="fas fa-heart" style="color: var(--danger);"></i></h2>
                <span id="wishlistCount" style="font-weight: 700; color: var(--text-muted); background: var(--surface); padding: 8px 16px; border-radius: 100px; border: 1px solid var(--border);">0 Items</span>
            </div>

            <div class="product-list" id="wishlistPageShelf">
                </div>

        </div>
    </main>

    <div class="full-page right-slide" id="wishlistProductPage">
        <div class="full-page-header glass-effect">
            <button class="btn-back premium-hover" onclick="closeProductView()"><i class="fas fa-arrow-left"></i> Back to Wishlist</button>
        </div>
        <div class="full-page-body product-page-body">
            <div class="product-hero">
                <div class="product-visual prime-visual-bg" style="position: relative; flex-direction: column; padding: 40px;">
                    <div style="width: 100%; display: flex; justify-content: center;">
                        <img id="wpImage" src="" alt="Product" class="main-prod-img">
                    </div>
                </div>

                <div class="product-data">
                    <div class="flex-row-between w-100">
                        <span class="category-tag"><i class="fas fa-crown"></i> Aryanta Quality</span>
                        <div style="display: flex; gap: 15px; font-size: 20px;">
                            <i class="fas fa-heart premium-hover" id="wpWishlistBtn" style="color: var(--danger);" title="Saved to Wishlist"></i>
                        </div>
                    </div>

                    <h1 id="wpName" class="display-title">Product Name</h1>
                    
                    <div class="seller-info" id="wpSellerInfo" style="margin-bottom: 20px; font-size: 14px; color: var(--text-muted);"></div>

                    <div class="price-block">
                        <h2 class="display-price"><span id="wpMrp" style="text-decoration: line-through; color: #94a3b8; font-size: 0.5em; margin-right: 10px; font-weight: 500; display:none;"></span><span id="wpPrice">₹0</span></h2>
                        <span class="inclusive-taxes">Inclusive of all taxes</span>
                    </div>
                    
                    <div class="divider-elegant"></div>
                    <p id="wpDesc" class="display-desc">Description goes here.</p>
                    <div class="divider-elegant"></div>

                    <div class="action-dock">
                        <button class="btn-add-cart" id="wpAddToCartBtn"><i class="fas fa-shopping-bag"></i> Add to Bag</button>
                        <button class="btn-buy-now bounce-hover" id="wpBuyNowBtn"><i class="fas fa-bolt"></i> Buy Now</button>
                    </div>

                    <div class="trust-badges">
                        <div class="badge-item"><i class="fas fa-shield-check"></i> <span>Secure Payment</span></div>
                        <div class="badge-item"><i class="fas fa-shipping-fast"></i> <span>Fast Shipping</span></div>
                        <div class="badge-item"><i class="fas fa-undo"></i> <span>7 Days Return</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toastNotification" class="toast-notification"><i class="fas fa-check-circle"></i> <span id="toastMessage">Action successful</span></div>

    <script>
        const API_BASE_URL = "https://rough-field-c679.official-aryanta.workers.dev";
        let localWishlist = JSON.parse(localStorage.getItem('local_wishlist')) || [];
        let allProducts = JSON.parse(localStorage.getItem('cached_products')) || [];
        let currentViewedProduct = null;

        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
            document.body.style.overflow = 'auto';
        }

        let toastTimer;
        function showToast(message) {
            const toast = document.getElementById('toastNotification');
            document.getElementById('toastMessage').innerText = message;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        async function initWishlist() {
            // Setup User Info
            const session = JSON.parse(localStorage.getItem('active_session'));
            if(session) {
                document.getElementById('sidebarUser').innerText = session.name;
                document.getElementById('sidebarRole').innerText = session.isPrime ? "Prime Member" : "Member";
                document.getElementById('sidebarAvatar').src = session.avatar || `https://api.dicebear.com/7.x/avataaars/svg?seed=${session.email}`;
            }

            // Fetch products if not in local storage
            if (allProducts.length === 0) {
                try {
                    document.getElementById('wishlistPageShelf').innerHTML = '<p style="grid-column: 1/-1; text-align:center;"><i class="fas fa-spinner fa-spin"></i> Loading wishlist data...</p>';
                    const res = await fetch(`${API_BASE_URL}/products`);
                    allProducts = await res.json();
                    localStorage.setItem('cached_products', JSON.stringify(allProducts));
                } catch(e) {
                    document.getElementById('wishlistPageShelf').innerHTML = '<p style="grid-column: 1/-1; text-align:center; color: var(--danger);">Failed to load products. Check your connection.</p>';
                    return;
                }
            }
            renderWishlist();
        }

        function renderWishlist() {
            const container = document.getElementById('wishlistPageShelf');
            const countBadge = document.getElementById('wishlistCount');
            
            // Filter products that exist in the wishlist array
            const wishedProducts = allProducts.filter(p => localWishlist.includes(p.id));
            
            countBadge.innerText = `${wishedProducts.length} Items`;

            if (wishedProducts.length === 0) {
                container.innerHTML = `
                    <div class="panel-box text-center" style="grid-column: 1/-1; padding: 60px 20px; border: 1px dashed var(--border);">
                        <i class="fas fa-heart-broken" style="font-size: 60px; color: #cbd5e1; margin-bottom: 20px;"></i>
                        <h3 style="font-size: 22px; color: var(--text-main); margin-bottom: 10px;">Your wishlist is empty</h3>
                        <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 15px;">Looks like you haven't saved any items to your wishlist yet.</p>
                        <button class="btn-prime bounce-hover" style="margin: 0 auto; min-width: 200px;" onclick="window.location.href='index.html'">
                            <i class="fas fa-compass"></i> Discover Products
                        </button>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            
            wishedProducts.forEach(p => {
                let img = p.image || (p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/300');
                let starUI = (p.avgRating && p.avgRating !== "New") ? `<i class="fas fa-star"></i> ${p.avgRating}` : `<i class="fas fa-star" style="color:#cbd5e1;"></i> New`;
                
                let price = Number(p.price).toLocaleString('en-IN');
                let mrpHTML = p.mrp > p.price ? `<span style="text-decoration:line-through; color:var(--text-muted); font-size:12px; margin-right:5px;">₹${Number(p.mrp).toLocaleString('en-IN')}</span>` : '';
                
                let sellerText = (!p.sellerEmail || p.sellerEmail === 'admin') ? `Aryanta Admin <i class="fas fa-check-circle" style="color:var(--primary); font-size:12px;"></i>` : p.sellerName;

                const div = document.createElement('div');
                div.className = 'list-item-card fade-in-up';
                div.style.cursor = 'pointer'; 
                
                // Open product overlay in the same page
                div.onclick = () => openProductView(p.id);
                
                div.innerHTML = `
                    <div class="list-image" style="position:relative;">
                        <img src="${img}" alt="${p.name}">
                    </div>
                    <div class="list-info" style="position: relative;">
                        <i class="fas fa-times premium-hover" onclick="event.stopPropagation(); removeFromWishlist('${p.id}')" style="position: absolute; top: 0; right: 0; font-size: 18px; color: var(--text-muted); z-index: 10;" title="Remove from Wishlist"></i>
                        
                        <h4>${p.name}</h4>
                        <div class="stars">${starUI}</div>
                        <div class="seller-line" style="margin-bottom: 10px;">Sold by ${sellerText}</div>
                        
                        <div class="price" style="margin-bottom: 15px;">
                            ${mrpHTML} ₹${price}
                        </div>
                        
                        <div class="list-actions">
                            <button class="btn-list-buy w-100" onclick="event.stopPropagation(); openProductView('${p.id}')">View Details</button>
                        </div>
                    </div>`;
                container.appendChild(div);
            });
        }

        // ================= IN-PAGE PRODUCT OVERLAY LOGIC =================
        
        function openProductView(id) {
            currentViewedProduct = allProducts.find(p => p.id === id);
            if (!currentViewedProduct) return;

            const p = currentViewedProduct;

            // Populate Modal Data
            document.getElementById('wpName').innerText = p.name;
            document.getElementById('wpDesc').innerText = p.desc || "High-quality product selected for you.";
            
            let price = Number(p.price);
            let mrp = p.mrp ? Number(p.mrp) : 0;
            
            if (mrp > price) {
                document.getElementById('wpMrp').innerText = `₹${mrp.toLocaleString('en-IN')}`;
                document.getElementById('wpMrp').style.display = 'inline';
            } else {
                document.getElementById('wpMrp').style.display = 'none';
            }
            document.getElementById('wpPrice').innerText = `₹${price.toLocaleString('en-IN')}`;

            let adminVerified = (!p.sellerEmail || p.sellerEmail === 'admin' || p.sellerName === 'Aryanta Admin');
            let verifiedUI = adminVerified 
                ? `<span class="verified-badge admin-badge"><i class="fas fa-shield-check"></i> Aryanta Verified</span>`
                : (p.isSellerVerified ? `<span class="verified-badge seller-badge"><i class="fas fa-check-circle"></i> Verified Seller</span>` : '');
            
            document.getElementById('wpSellerInfo').innerHTML = `Sold by: <strong style="color: var(--primary);">${p.sellerName || "Aryanta Admin"}</strong><br>${verifiedUI}`;

            document.getElementById('wpImage').src = p.image || (p.images && p.images.length > 0 ? p.images[0] : 'https://via.placeholder.com/600');

            // Set button actions to redirect to main page's cart functionality
            document.getElementById('wpAddToCartBtn').onclick = () => addToCartAndRedirect(p.id);
            document.getElementById('wpBuyNowBtn').onclick = () => buyNowAndRedirect(p.id);

            // Remove item from wishlist directly from overlay
            document.getElementById('wpWishlistBtn').onclick = () => {
                removeFromWishlist(p.id);
                closeProductView();
            };

            // Slide in the product modal
            document.getElementById('wishlistProductPage').classList.add('open');
            document.body.style.overflow = 'hidden'; // Stop background scrolling
        }

        function closeProductView() {
            document.getElementById('wishlistProductPage').classList.remove('open');
            document.body.style.overflow = 'auto'; // Restore background scrolling
            currentViewedProduct = null;
        }

        async function removeFromWishlist(id) {
            localWishlist = localWishlist.filter(itemId => itemId !== id);
            localStorage.setItem('local_wishlist', JSON.stringify(localWishlist));
            
            showToast("Item removed from Wishlist");
            renderWishlist();

            const session = JSON.parse(localStorage.getItem('active_session'));
            if (session && session.email) {
                try {
                    await fetch(`${API_BASE_URL}/update-user`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: session.email, updates: { wishlist: localWishlist }, projectId: "aryanta-mart-a8893" })
                    });
                } catch(e) {}
            }
        }

        // Action Buttons: Adds to local cart, then redirects to index to process the cart natively
        function addToCartAndRedirect(id) {
            let cart = JSON.parse(localStorage.getItem('local_cart')) || [];
            const existing = cart.find(i => i.id === id);
            if(existing) existing.qty += 1;
            else cart.push({ ...currentViewedProduct, qty: 1 });
            
            localStorage.setItem('local_cart', JSON.stringify(cart));
            window.location.href = 'index.html'; // Go to main page to view cart
        }

        function buyNowAndRedirect(id) {
            let cart = [{ ...currentViewedProduct, qty: 1 }];
            localStorage.setItem('local_cart', JSON.stringify(cart));
            window.location.href = 'index.html'; // Go to main page to view checkout
        }

        // Run on page load
        initWishlist();
    </script>
</body>
</html>
