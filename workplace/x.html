    const EMOJIS = ["😀","😁","😂","🤣","😊","😍","😘","😎","🥳","😢","😡","👍","👎","👏","🙏","💪","❤️","🔥","✨","✅","❌","📌","💯","🎉"];

    const $ = id => document.getElementById(id);
    const safeJson = (value, fallback = {}) => { try { return JSON.parse(value || "null") || fallback; } catch { return fallback; } };
    const escapeHtml = value => String(value ?? "").replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]));
    const safeKey = value => String(value || "guest").replace(/[.#$\/[\]]/g, "_");

    const SESSION_KEYS = [
      PROFILE_KEY,
      "aryanta_admin_user",
      "aryanta_current_admin",
      "aryanta_login_admin",
      "active_admin",
      "admin_profile",
      "aryanta_admin_session",
      "aryanta_admin_auth",
      "aryanta_user",
      "aryanta_logged_admin"
    ];

    function pickObject(value) {
      if (!value || typeof value !== "object") return {};
      if (value.admin && typeof value.admin === "object") return { ...value, ...value.admin };
      if (value.user && typeof value.user === "object") return { ...value, ...value.user };
      if (value.profile && typeof value.profile === "object") return { ...value, ...value.profile };
      if (value.data && typeof value.data === "object") return { ...value, ...value.data };
      return value;
    }

    function normalizeStoredAdmin(value = {}) {
      const raw = pickObject(value);
      const uid = String(raw.uid || raw.adminUid || raw.adminID || raw.id || raw.userId || raw.userID || "").trim();
      return {
        ...raw,
        uid,
        name: raw.name || raw.fullName || raw.displayName || raw.userName || raw.adminName || raw.email || uid || "Admin",
        email: raw.email || raw.mail || "",
        role: raw.role || raw.type || "Admin"
      };
    }

    function readCurrentAdminFromStorage() {
      let best = {};
      SESSION_KEYS.forEach(key => {
        const sessionValue = normalizeStoredAdmin(safeJson(sessionStorage.getItem(key), {}));
        const localValue = normalizeStoredAdmin(safeJson(localStorage.getItem(key), {}));
        if (sessionValue.uid) best = { ...best, ...sessionValue };
        if (localValue.uid && !best.uid) best = { ...best, ...localValue };
      });
      return best;
    }

    function isLocalUid(uid) {
      const value = String(uid || "").trim().toLowerCase();
      return !value || value === "guest" || value === "admin" || value === "null" || value === "undefined" || value.startsWith("local-") || value.startsWith("temp-") || value.startsWith("anonymous");
    }

    function isRealAdminUid(uid) {
      return /^(ADM|ARY)-\d{4,}$/i.test(String(uid || "").trim());
    }

    function isSafeChatUid(uid) {
      const value = String(uid || "").trim();
      if (isLocalUid(value)) return false;
      if (value.length > 80) return false;
      return /^[A-Za-z0-9_@.\-]+$/.test(value);
    }

    let currentUser = normalizeStoredAdmin(readCurrentAdminFromStorage());
    const myUid = String(currentUser.uid || "").trim();
    const myKey = safeKey(myUid || "guest");
    const myName = currentUser.name || currentUser.displayName || currentUser.fullName || currentUser.email || "Admin";

    // CORE LAG FIX: In-memory decryption cache
    let decryptedPayloadCache = {};

    function isUsableImage(value) {
      const v = String(value || "").trim();
      if (!v || v === "<na>" || v === "null" || v === "undefined") return false;
      return /^(https?:|data:image|blob:)/i.test(v);
    }

    function firstUsableImage(...values) {
      for (const value of values) {
        if (isUsableImage(value)) return String(value).trim();
      }
      return ARYANTA_LOGO;
    }

    function readProfileObjectFromStorage() {
      const keys = [
        PROFILE_KEY,
        "aryanta_admin_user",
        "aryanta_current_admin",
        "aryanta_login_admin",
        "active_admin",
        "admin_profile"
      ];
      const merged = {};
      keys.forEach(key => {
        Object.assign(merged, safeJson(sessionStorage.getItem(key), {}));
        Object.assign(merged, safeJson(localStorage.getItem(key), {}));
      });
      return merged;
    }

    function resolveMyProfileImage() {
      const fresh = { ...currentUser, ...readProfileObjectFromStorage() };
      return firstUsableImage(
        fresh.profileImage,
        fresh.profilePic,
        fresh.profilePhoto,
        fresh.photoURL,
        fresh.photoUrl,
        fresh.photo,
        fresh.picture,
        fresh.avatar,
        fresh.image,
        fresh.imageUrl,
        fresh.userImage,
        fresh.adminImage,
        fresh.adminPhoto,
        fresh.logo,
        fresh.dp,
        localStorage.getItem("aryanta_admin_profile_image"),
        sessionStorage.getItem("aryanta_admin_profile_image")
      );
    }

    let myImage = resolveMyProfileImage();
    let adminProfileMap = {};
    let userProfileMap = {};
    let activeChat = { type: "group", id: "group", uid: "all", name: "Admin Group", image: ARYANTA_LOGO };
    let activeMessageRef = null;
    let activeTypingRef = null;
    let activePresenceRef = null;
    let allAdminProfiles = [];
    let allUserProfiles = [];

    const DEFAULT_SETTINGS = {
      notify: false,
      banner: true,
      camera: false,
      files: false,
      mic: false,
      music: false,
      audio: true,
      theme: "light",
      messageDeleteDays: "0"
    };

    let appSettings = { ...DEFAULT_SETTINGS, ...safeJson(localStorage.getItem(SETTINGS_KEY), {}) };
    let notificationPermissionAsked = false;
    let notificationAudioCtx = null;
    let firstMessageLoadDone = false;
    let lastKnownMessageTs = 0;
    let typingRemoteDisabled = true;

    // --- UTILS AND ALERTS ---
    function showToast(msg, options = {}) {
      loadAdminSettings();
      if (!options.force && appSettings.notify !== true) return;
      const holder = $("toastHolder");
      if (!holder) return;
      const toast = document.createElement("div");
      toast.className = "toast show";
      toast.innerHTML = `<i class="fas fa-info-circle"></i><span>${escapeHtml(msg)}</span>`;
      holder.appendChild(toast);
      setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 300); }, Number(options.duration || 2200));
    }

    function requireValidChatLogin() {
      if (isRealAdminUid(myUid)) return true;
      showLockedChatScreen();
      showToast("Login first with a real admin UID to access chat.", { force: true, duration: 4500 });
      return false;
    }

    function showLockedChatScreen() {
      const home = $("homeScreen");
      const chat = $("chatScreen");
      if (chat) chat.style.display = "none";
      if (!home) return;
      home.style.display = "flex";
      home.innerHTML = `
        <header class="topbar">
          <button class="back-btn" onclick="window.location.href='admin.html'"><i class="fas fa-arrow-left"></i></button>
          <div class="chat-header-info"><div class="chat-title" style="font-size:20px;">Chats Locked</div></div>
        </header>
        <main class="chat-box" style="padding:24px;align-items:center;justify-content:center;text-align:center;">
          <div style="width:min(360px,100%);background:var(--card);border:1px solid var(--border);border-radius:26px;padding:24px;box-shadow:0 14px 36px rgba(0,0,0,.08);">
            <img src="${ARYANTA_LOGO}" alt="Aryanta" style="width:74px;height:74px;border-radius:50%;object-fit:cover;margin-bottom:14px;border:1px solid var(--border);">
            <h2 style="font-size:20px;margin-bottom:8px;">Login required</h2>
            <p style="font-size:13px;color:var(--muted);font-weight:700;line-height:1.45;margin-bottom:18px;">Chat can write only with a real admin UID like ADM-289711. Local/guest IDs are blocked to stop Firebase permission_denied errors.</p>
            <button onclick="window.location.href='admin.html'" style="background:var(--primary);color:#fff;font-weight:900;border-radius:999px;padding:12px 18px;width:100%;">Open Admin Login</button>
          </div>
        </main>`;
    }

    function getKnownSenderImage(uid, fallbackImage) {
      const profile = userProfileMap[safeKey(uid)] || adminProfileMap[safeKey(uid)] || {};
      return firstUsableImage(
        fallbackImage,
        profile.profileImage,
        profile.image,
        profile.photo,
        profile.photoURL,
        profile.avatar,
        profile.logo,
        ARYANTA_LOGO
      );
    }

    function getMessageAvatar(msg) {
      if (!msg) return ARYANTA_LOGO;
      return getKnownSenderImage(msg.senderUid, msg.senderImage);
    }

    function getAdminName(uid, fallbackName) {
      const profile = userProfileMap[safeKey(uid)] || adminProfileMap[safeKey(uid)] || {};
      return profile.name || profile.fullName || profile.displayName || fallbackName || "Admin";
    }

    // --- MULTI-CHAT LOGIC ---
    function getDirectChatId(a, b) {
      return [safeKey(a), safeKey(b)].sort().join("__");
    }

    function getActiveChatPath() {
      if (activeChat.type === "direct") {
        if (!isSafeChatUid(myUid) || !isSafeChatUid(activeChat.uid) || String(activeChat.uid).toLowerCase().startsWith("local-")) return null;
        return `${DIRECT_CHAT_ROOT}/${getDirectChatId(myUid, activeChat.uid)}`;
      }
      return GROUP_CHAT_PATH;
    }

    function getTypingPathForActiveChat() {
      return `${TYPING_PATH}/${safeKey(activeChat.type === "direct" ? getDirectChatId(myUid, activeChat.uid) : "group")}`;
    }

    function getPresencePathForActiveChat() {
      return `${PRESENCE_PATH}/${safeKey(activeChat.type === "direct" ? getDirectChatId(myUid, activeChat.uid) : "group")}`;
    }

    function normalizeAdminProfile(uid, raw = {}) {
      const item = pickObject(raw || {});
      const id = String(item.uid || item.adminUid || item.adminID || item.id || item.userId || item.userID || uid || "").trim();
      if (!id) return null;
      const image = firstUsableImage(
        item.profileImage,
        item.profilePic,
        item.profilePhoto,
        item.photoURL,
        item.photoUrl,
        item.photo,
        item.picture,
        item.avatar,
        item.image,
        item.imageUrl,
        item.userImage,
        item.adminImage,
        item.adminPhoto,
        item.logo,
        item.dp,
        ARYANTA_LOGO
      );
      return {
        uid: id,
        key: safeKey(id),
        name: item.name || item.fullName || item.displayName || item.userName || item.adminName || item.email || id,
        email: item.email || item.mail || "",
        role: item.role || item.type || "Admin",
        image,
        source: "admins",
        updatedAt: Number(item.updatedAt || item.lastLoginAt || item.createdAt || 0)
      };
    }

    function normalizeChatUserProfile(uid, raw = {}, source = "users") {
      const item = pickObject(raw || {});
      const id = String(
        item.uid ||
        item.userUid ||
        item.userUID ||
        item.customerUid ||
        item.customerUID ||
        item.id ||
        item.userId ||
        item.userID ||
        item.phone ||
        item.mobile ||
        item.email ||
        uid ||
        ""
      ).trim();
      if (!id || !isSafeChatUid(id)) return null;
      const image = firstUsableImage(
        item.profileImage,
        item.profilePic,
        item.profilePhoto,
        item.photoURL,
        item.photoUrl,
        item.photo,
        item.picture,
        item.avatar,
        item.image,
        item.imageUrl,
        item.userImage,
        item.customerImage,
        item.logo,
        item.dp,
        ARYANTA_LOGO
      );
      return {
        uid: id,
        key: safeKey(id),
        name: item.name || item.fullName || item.displayName || item.userName || item.customerName || item.username || item.email || item.phone || id,
        email: item.email || item.mail || "",
        phone: item.phone || item.mobile || item.phoneNumber || "",
        role: item.role || item.type || item.accountType || "user",
        image,
        source,
        updatedAt: Number(item.updatedAt || item.lastLoginAt || item.createdAt || item.timestamp || 0)
      };
    }

    function isAdminLikeProfile(profile = {}) {
      const uid = String(profile.uid || "").trim();
      const key = safeKey(uid);
      const role = String(profile.role || profile.type || profile.accountType || "").toLowerCase();
      const name = String(profile.name || profile.fullName || profile.displayName || "").toLowerCase();
      const source = String(profile.source || "").toLowerCase();
      if (adminProfileMap[key]) return true;
      if (/^(ADM|ARY)-\d{4,}$/i.test(uid)) return true;
      if (source === "admins" || source === "admin_chat_profiles") return true;
      if (role.includes("admin") || role.includes("owner") || role.includes("staff")) return true;
      if (name === "admin" || name.startsWith("admin ") || name.includes(" administrator")) return true;
      return false;
    }

    function refreshUserProfiles() {
      allUserProfiles = Object.values(userProfileMap)
        .filter(p => p && p.uid)
        .filter(p => isSafeChatUid(p.uid))
        .filter(p => safeKey(p.uid) !== myKey)
        .filter(p => !isAdminLikeProfile(p))
        .sort((a, b) => {
          const au = Number(a.updatedAt || 0);
          const bu = Number(b.updatedAt || 0);
          if (bu !== au) return bu - au;
          return String(a.name || a.uid).localeCompare(String(b.name || b.uid));
        });
      renderChatUserList();
      updateChatHeader();
    }

    function mergeAdminProfiles(sourceMap = {}) {
      Object.entries(sourceMap || {}).forEach(([key, value]) => {
        const profile = normalizeAdminProfile(value?.uid || value?.id || key, value || {});
        if (!profile) return;
        adminProfileMap[profile.key] = { ...(adminProfileMap[profile.key] || {}), ...profile };
      });
      const selfProfile = normalizeAdminProfile(myUid, { ...currentUser, uid: myUid, name: myName, image: myImage, profileImage: myImage });
      if (selfProfile) adminProfileMap[selfProfile.key] = { ...(adminProfileMap[selfProfile.key] || {}), ...selfProfile };
      allAdminProfiles = Object.values(adminProfileMap)
        .filter(p => p && p.uid)
        .sort((a, b) => String(a.name || a.uid).localeCompare(String(b.name || b.uid)));
      refreshUserProfiles();
      renderMessages();
    }

    function mergeUserProfiles(sourceMap = {}, source = "users") {
      Object.entries(sourceMap || {}).forEach(([key, value]) => {
        const profile = normalizeChatUserProfile(value?.uid || value?.id || key, value || {}, source);
        if (!profile) return;
        if (isAdminLikeProfile(profile)) return;
        userProfileMap[profile.key] = { ...(userProfileMap[profile.key] || {}), ...profile };
      });
      refreshUserProfiles();
      renderMessages();
    }

    function updateChatHeader() {
      const title = activeChat.type === "direct" ? (activeChat.name || "User") : "Admin Group";
      const image = activeChat.type === "direct" ? firstUsableImage(activeChat.image, ARYANTA_LOGO) : ARYANTA_LOGO;
      const subtitle = activeChat.type === "direct" ? `${activeChat.uid || "User"} • User chat` : `Group chat • ${allAdminProfiles.length || "all"} admins`;
      if ($("headerTitle")) $("headerTitle").textContent = title;
      if ($("headerSubtitle")) $("headerSubtitle").innerHTML = `<i class="fas fa-lock"></i> ${escapeHtml(subtitle)}`;
      if ($("headerAvatar")) $("headerAvatar").src = image;
      document.querySelector("#targetGroup")?.classList.toggle("active", activeChat.type === "group");
      const groupText = document.querySelector("#targetGroup span");
      if (groupText) groupText.textContent = `All admins group • ${allAdminProfiles.length || 0} admins`;
      const titleNode = document.querySelector(".chat-target-title");
      if (titleNode) titleNode.textContent = `Users (${allUserProfiles.length})`;
    }

    function renderChatUserList() {
      const list = $("chatUserList");
      if (!list) return;
      const users = allUserProfiles;

      if (!users.length) {
        list.innerHTML = `<div class="chat-empty-row">No normal users found yet. This list reads from /users and hides admin accounts.</div>`;
        updateChatHeader();
        return;
      }

      list.innerHTML = users.map(p => {
        const sub = [p.phone, p.email, p.uid].filter(Boolean).slice(0, 2).join(" • ") || p.uid;
        return `
          <button class="admin-chat-row ${activeChat.type === 'direct' && safeKey(activeChat.uid) === safeKey(p.uid) ? 'active' : ''}" onclick="selectDirectChat('${escapeHtml(p.uid)}')">
            <img src="${escapeHtml(firstUsableImage(p.image, ARYANTA_LOGO))}" alt="${escapeHtml(p.name)}" onerror="this.onerror=null;this.src='${ARYANTA_LOGO}'">
            <div><strong>${escapeHtml(p.name)}</strong><span>${escapeHtml(sub)}</span></div>
            <i class="fas fa-message"></i>
          </button>
        `;
      }).join("");
      updateChatHeader();
    }

    // --- SCREEN NAVIGATION LOGIC ---
    function showHomeScreen() {
      $("chatScreen").style.display = "none";
      $("homeScreen").style.display = "flex";
      if (activeMessageRef) { activeMessageRef.off(); activeMessageRef = null; }
      if (activeTypingRef) { activeTypingRef.off(); activeTypingRef = null; }
      renderChatUserList();
      closeAllMenus();
      try { history.pushState({ aryantaChat: true, layer: "home" }, ""); } catch {}
    }

    function openChatPicker() {
      showHomeScreen();
    }

    function selectGroupChat() {
      if (!requireValidChatLogin()) return;
      activeChat = { type: "group", id: "group", uid: "all", name: "Admin Group", image: ARYANTA_LOGO };
      $("homeScreen").style.display = "none";
      $("chatScreen").style.display = "flex";
      switchChatSource();
      closeAllMenus();
      showToast("Group chat opened", { force: true });
    }

    function selectDirectChat(uid) {
      if (!requireValidChatLogin()) return;
      if (!isSafeChatUid(uid) || String(uid).toLowerCase().startsWith("local-")) {
        showToast("This user is not logged in with a real account yet. Direct chat is blocked for local/guest IDs.", { force: true, duration: 4200 });
        return;
      }
      const profile = userProfileMap[safeKey(uid)] || allUserProfiles.find(p => safeKey(p.uid) === safeKey(uid));
      if (!profile) {
        showToast("User not found in /users yet. Refresh after the user is added.", { force: true, duration: 4200 });
        return;
      }
      if (isAdminLikeProfile(profile)) {
        showToast("Admins are available only in Admin Group. Direct admin-to-admin chat is disabled.", { force: true, duration: 4200 });
        return;
      }
      activeChat = { type: "direct", id: getDirectChatId(myUid, profile.uid), uid: profile.uid, name: profile.name || profile.uid, image: firstUsableImage(profile.image, ARYANTA_LOGO), targetRole: "user" };
      $("homeScreen").style.display = "none";
      $("chatScreen").style.display = "flex";
      switchChatSource();
      closeAllMenus();
      showToast(`User chat opened`, { force: true });
    }

    function switchChatSource() {
      if (!requireValidChatLogin()) return;
      if (activeChat.type === "direct") {
        const targetProfile = userProfileMap[safeKey(activeChat.uid)] || allUserProfiles.find(p => safeKey(p.uid) === safeKey(activeChat.uid));
        if (!isSafeChatUid(activeChat.uid) || String(activeChat.uid).toLowerCase().startsWith("local-") || !targetProfile || isAdminLikeProfile(targetProfile)) {
          showHomeScreen();
          showToast("Direct chat blocked: open a normal user from the Users list. Admins stay in group chat only.", { force: true, duration: 4200 });
          return;
        }
      }
      if (activeMessageRef) activeMessageRef.off();
      if (activeTypingRef) activeTypingRef.off();
      messages = [];
      selectedMsgIds.clear();
      selectedMsgId = null;
      replyingToId = null;
      chatClearedAt = Number(localStorage.getItem(`chat_cleared_${myKey}_${safeKey(activeChat.id || activeChat.type)}`) || 0);
      firstMessageLoadDone = false;
      lastKnownMessageTs = 0;
      updateChatHeader();
      renderMessages();
      listenForMessages(); 
      listenTyping();      
      try { history.pushState({ aryantaChat: true, layer: "chat" }, ""); } catch {}
      setTimeout(scrollToBottom, 200);
    }

    async function updateMyChatProfile() {
      if (!isRealAdminUid(myUid)) return;
      myImage = resolveMyProfileImage();
      const profile = {
        uid: myUid,
        name: myName,
        fullName: myName,
        image: myImage,
        profileImage: myImage,
        photoURL: myImage,
        role: currentUser.role || "Admin",
        updatedAt: Date.now()
      };
      try {
        await db.ref(`${ADMIN_PROFILES_PATH}/${myKey}`).update(profile);
        await db.ref(`${ADMINS_DB_PATH}/${myKey}/chatProfile`).update(profile).catch(() => {});
      } catch (err) {
        // Profile sharing needs Firebase rules. Chat still works without this.
      }
    }

    function listenAdminProfiles() {
      if (!isRealAdminUid(myUid)) return;
      db.ref(ADMIN_PROFILES_PATH).on("value", snap => {
        mergeAdminProfiles(snap.val() || {});
      }, () => {});
      db.ref(ADMINS_DB_PATH).on("value", snap => {
        const admins = snap.val() || {};
        const flat = {};
        Object.entries(admins).forEach(([key, value]) => {
          const raw = value?.chatProfile ? { ...value, ...value.chatProfile } : value;
          flat[key] = raw || {};
        });
        mergeAdminProfiles(flat);
      }, () => {});
    }

    function listenUserProfiles() {
      if (!isRealAdminUid(myUid)) return;
      const onUsers = source => snap => mergeUserProfiles(snap.val() || {}, source);
      db.ref(USERS_DB_PATH).on("value", onUsers("users"), err => {
        showToast("Could not load users list. Check /users read rule.", { force: true, duration: 3600 });
      });
      db.ref(EMPLOYEES_DB_PATH).on("value", onUsers("employees"), () => {});
    }

    function loadAdminSettings() {
      const saved = safeJson(localStorage.getItem(SETTINGS_KEY), {});
      appSettings = { ...DEFAULT_SETTINGS, ...saved };
      return appSettings;
    }

    function settingEnabled(key) {
      loadAdminSettings();
      return appSettings[key] === true;
    }

    function applyAdminSettings() {
      loadAdminSettings();
      applySavedTheme();
      document.body.classList.toggle("notify-enabled", appSettings.notify === true);
      const cameraOpt = document.querySelector(".attach-opt[onclick='openCameraSheet()']");
      const galleryOpt = document.querySelector(".attach-opt[onclick=\"triggerInput('galleryInput')\"]");
      const docOpt = document.querySelector(".attach-opt[onclick=\"triggerInput('docInput')\"]");
      cameraOpt?.classList.toggle("permission-disabled", appSettings.camera !== true);
      galleryOpt?.classList.toggle("permission-disabled", appSettings.files !== true);
      docOpt?.classList.toggle("permission-disabled", appSettings.files !== true);
      if (appSettings.mic !== true) $("btnMic")?.classList.add("permission-disabled");
      else $("btnMic")?.classList.remove("permission-disabled");
      maybeRequestNotificationPermission();
      updateChatHeader();
    }

    function maybeRequestNotificationPermission() {
      if (!appSettings.notify || notificationPermissionAsked) return;
      if (!("Notification" in window)) return;
      notificationPermissionAsked = true;
      if (Notification.permission === "default") {
        Notification.requestPermission().catch(() => {});
      }
    }

    function featureBlocked(label) {
      showToast(`Please grant ${label} permission in Admin Home → Settings, then reopen Chat.`, { force: true, duration: 3200 });
    }

    function playNotifySound() {
      loadAdminSettings();
      if (!appSettings.audio) return;
      try {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (!AudioContext) return;
        notificationAudioCtx = notificationAudioCtx || new AudioContext();
        const osc = notificationAudioCtx.createOscillator();
        const gain = notificationAudioCtx.createGain();
        osc.frequency.value = 880;
        gain.gain.value = 0.035;
        osc.connect(gain);
        gain.connect(notificationAudioCtx.destination);
        osc.start();
        setTimeout(() => { try { osc.stop(); } catch {} }, 120);
      } catch {}
    }

    function notifyIncomingMessage(msg) {
      loadAdminSettings();
      if (!appSettings.notify || !msg || msg.senderUid === myUid) return;
      
      const chatName = activeChat.type === "direct" ? msg.senderName : "Admin Group";
      const title = `${chatName} (New Message)`;
      const sender = msg.senderName || "User";
      const text = String(msg.text || "").trim();
      
      let body = text ? text : (Array.isArray(msg.attachments) && msg.attachments.length ? describeAttachment(msg.attachments[0]) : "New message");
      if (activeChat.type === "group") body = `${sender}: ${body}`;
      
      if (document.visibilityState === "hidden" && "Notification" in window && Notification.permission === "granted") {
        try {
          new Notification(title, {
            body,
            icon: getMessageAvatar(msg),
            tag: `aryanta-chat-${activeChat.id || 'group'}`,
            silent: appSettings.audio !== true
          });
        } catch {}
      } else if (document.visibilityState === "hidden") {
         showToast(body, { force: true, duration: 3200 });
      } else {
         if ($("chatScreen").style.display === "none") {
             showToast(`New message from ${chatName}`, { force: true, duration: 3200 });
         }
      }
      playNotifySound();
    }

    function getImageRateKey() {
      return `aryanta_chat_image_rate_${myKey}`;
    }

    function canAddAttachment(type, count = 1) {
      if (attachmentsBase64.length + count > MAX_ATTACHMENTS) {
        showToast(`Maximum ${MAX_ATTACHMENTS} files can be sent at once`);
        return false;
      }
      if (type === "image") {
        const currentImages = attachmentsBase64.filter(a => a.type === "image").length;
        if (currentImages + count > MAX_ATTACHMENTS) {
          showToast(`Maximum ${MAX_ATTACHMENTS} images can be selected at once`);
          return false;
        }
        const now = Date.now();
        const old = safeJson(localStorage.getItem(getImageRateKey()), []).filter(ts => now - Number(ts) < 60000);
        if (old.length + count > MAX_IMAGES_PER_MINUTE) {
          showToast(`Maximum ${MAX_IMAGES_PER_MINUTE} pictures per minute`);
          return false;
        }
      }
      return true;
    }

    function noteImageAdded(count = 1) {
      const now = Date.now();
      const old = safeJson(localStorage.getItem(getImageRateKey()), []).filter(ts => now - Number(ts) < 60000);
      for (let i = 0; i < count; i++) old.push(now);
      localStorage.setItem(getImageRateKey(), JSON.stringify(old));
    }

    let messages = [];
    let replyingToId = null;
    let selectedMsgId = null;
    let attachmentsBase64 = [];
    let selectedMsgIds = new Set();
    let chatClearedAt = Number(localStorage.getItem(`chat_cleared_${myKey}`) || 0);
    let typingTimer = null;
    let cameraStream = null;
    let cameraFacing = "environment";
    let lastTap = { id: null, time: 0 };

    function initApp() {
      applyAdminSettings();
      buildEmojiGrid();
      setupListeners();
      setupNoCopyProtection();
      if (!isRealAdminUid(myUid)) {
        showLockedChatScreen();
        return;
      }
      listenAdminProfiles();
      listenUserProfiles();
      updateMyChatProfile();
      setupPresence();
      showHomeScreen(); 
      
      window.addEventListener("storage", event => {
        if (event.key === SETTINGS_KEY) {
          applyAdminSettings();
          renderMessages();
          handleInputResize();
        }
        if (event.key === PROFILE_KEY || event.key === "aryanta_admin_profile_image") {
          myImage = resolveMyProfileImage();
          updateMyChatProfile();
          renderMessages();
        }
      });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          applyAdminSettings();
          handleInputResize();
          lastKnownMessageTs = Math.max(lastKnownMessageTs, Date.now() - 1000);
        }
      });
    }

    function applySavedTheme() {
      const savedSettings = appSettings || loadAdminSettings();
      const theme = savedSettings.theme || "light";
      const useDark = theme === "dark" || (theme === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.setAttribute("data-theme", useDark ? "dark" : "light");
    }

    function toggleThemeMode() {
      applyAdminSettings();
      closeAllMenus();
      showToast("Theme follows Admin Settings");
    }

    function goBack() {
      if (closeTopLayer()) return;
      if ($("chatScreen").style.display !== "none") {
         showHomeScreen();
         return;
      }
      window.location.href = "admin.html";
    }

    function closeTopLayer() {
      if ($("imageViewer")?.classList.contains("active")) { closeImageViewer(); return true; }
      if ($("fileViewer")?.classList.contains("active")) { closeFileViewer(); return true; }
      if ($("cameraModal")?.classList.contains("active")) { closeCameraSheet(); return true; }
      if ($("mainOverlay")?.classList.contains("active")) { closeAllMenus(); return true; }
      if (document.body.classList.contains("select-mode")) { cancelSelectMode(); return true; }
      return false;
    }

    function setupMobileBackHandler() {
      try { history.replaceState({ aryantaChat: true }, ""); history.pushState({ aryantaChat: true, layer: "home" }, ""); } catch {}
      window.addEventListener("popstate", () => {
        if (closeTopLayer()) {
          try { history.pushState({ aryantaChat: true, layer: "chat" }, ""); } catch {}
          return;
        }
        if ($("chatScreen").style.display !== "none") {
           showHomeScreen();
           try { history.pushState({ aryantaChat: true, layer: "home" }, ""); } catch {}
           return;
        }
        window.location.href = "admin.html";
      });
    }

    function setupNoCopyProtection() {
      document.addEventListener("contextmenu", e => { if(!e.target.closest('.msg-row')) e.preventDefault(); });
      document.addEventListener("copy", e => {
        const tag = String(document.activeElement?.tagName || "").toLowerCase();
        if (tag !== "textarea" && tag !== "input") e.preventDefault();
      });
    }

    function handleInputResize() {
      const input = $("chatInput");
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
      const hasText = input.value.trim().length > 0;
      const hasContent = hasText || attachmentsBase64.length > 0;
      const wrapper = $("inputRow")?.parentElement;
      if (wrapper) wrapper.classList.toggle("typing-active", hasContent);
      $("btnSend").style.display = hasContent ? "flex" : "none";
      $("btnMic").style.display = (!hasContent && settingEnabled("mic")) ? "flex" : "none";
      sendTypingSignal();
    }

    function toggleAttachMenu() {
      if ($("attachMenu").classList.contains("active")) return closeAllMenus();
      closeAllMenus();
      $("attachMenu").classList.add("active");
      $("mainOverlay").classList.add("active");
      $("btnAttach").classList.add("active");
    }

    function openTopMenu() {
      closeAllMenus();
      $("topMenu").classList.add("active");
      $("mainOverlay").classList.add("active");
    }

    function closeAllMenus() {
      ["attachMenu", "topMenu", "msgMenu", "emojiMenu", "searchMenu"].forEach(id => $(id)?.classList.remove("active"));
      $("mainOverlay")?.classList.remove("active");
      $("btnAttach")?.classList.remove("active");
    }

    function buildEmojiGrid() {
      const grid = $("emojiGrid");
      if (!grid) return;
      grid.innerHTML = EMOJIS.map(e => `<button onclick="insertEmoji('${e}')">${e}</button>`).join("");
    }

    function toggleEmojiMenu() {
      if ($("emojiMenu").classList.contains("active")) return closeAllMenus();
      closeAllMenus();
      $("emojiMenu").classList.add("active");
      $("mainOverlay").classList.add("active");
    }

    function insertEmoji(emoji) {
      const input = $("chatInput");
      const start = input.selectionStart || input.value.length;
      const end = input.selectionEnd || input.value.length;
      input.value = input.value.slice(0, start) + emoji + input.value.slice(end);
      input.focus();
      const pos = start + emoji.length;
      input.setSelectionRange(pos, pos);
      closeAllMenus();
      handleInputResize();
    }

    let recognition;
    let isRecording = false;

    function toggleVoiceRecording() {
      if (!settingEnabled("mic")) return featureBlocked("Microphone");
      if (!("webkitSpeechRecognition" in window) && !("SpeechRecognition" in window)) return showToast("Speech recognition not supported here");
      if (isRecording) {
        if (recognition) recognition.stop();
        return;
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      recognition = new SpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = true;
      recognition.lang = "en-US";
      recognition.onstart = () => {
        isRecording = true;
        $("btnMic").classList.add("recording");
        $("chatInput").placeholder = "Listening...";
      };
      recognition.onresult = event => {
        let finalTranscript = "";
        for (let i = event.resultIndex; i < event.results.length; i++) {
          if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript;
        }
        if (finalTranscript) {
          const input = $("chatInput");
          input.value += (input.value ? " " : "") + finalTranscript.trim();
          handleInputResize();
        }
      };
      recognition.onerror = event => { showToast("Mic error: " + event.error); stopRecordingUI(); };
      recognition.onend = stopRecordingUI;
      recognition.start();
    }

    function stopRecordingUI() {
      isRecording = false;
      $("btnMic").classList.remove("recording");
      $("chatInput").placeholder = "Message";
      handleInputResize();
    }

    async function takeScreenshot() {
      closeAllMenus();
      showToast("Capturing chat...");
      try {
        const chatElement = $("chatBox");
        const scrollPos = chatElement.scrollTop;
        const bg = getComputedStyle(document.body).getPropertyValue("--bg").trim() || "#efeae2";
        const canvas = await html2canvas(chatElement, { backgroundColor: bg, scale: 2 });
        downloadDataUrl(canvas.toDataURL("image/jpeg", 0.9), `Aryanta_Chat_${Date.now()}.jpg`);
        chatElement.scrollTop = scrollPos;
        showToast("Screenshot saved");
      } catch (err) { showToast("Screenshot failed"); }
    }

    function enterSelectMode() {
      closeAllMenus();
      document.body.classList.add("select-mode");
      selectedMsgIds.clear();
      updateSelectCount();
      renderMessages();
    }

    function cancelSelectMode() {
      document.body.classList.remove("select-mode");
      selectedMsgIds.clear();
      renderMessages();
    }

    function toggleMsgSelection(e, id) {
      if (!document.body.classList.contains("select-mode")) return;
      e.stopPropagation();
      if (selectedMsgIds.has(id)) selectedMsgIds.delete(id); else selectedMsgIds.add(id);
      updateSelectCount();
      renderMessages();
    }

    function updateSelectCount() { $("selectCount").textContent = `${selectedMsgIds.size} selected`; }

    async function deleteSelectedMsgs() {
      if (selectedMsgIds.size === 0) return showToast("No messages selected");
      if (!confirm(`Delete ${selectedMsgIds.size} message(s) for everyone?`)) return;
      const updates = {};
      selectedMsgIds.forEach(id => {
        updates[`${getActiveChatPath()}/${id}/deletedForAll`] = true;
        updates[`${getActiveChatPath()}/${id}/text`] = "";
        updates[`${getActiveChatPath()}/${id}/attachments`] = null;
      });
      try {
        await db.ref().update(updates);
        cancelSelectMode();
        showToast("Messages deleted");
      } catch { showToast("Failed to delete messages"); }
    }

    function triggerInput(id) {
      closeAllMenus();
      if ((id === "galleryInput" || id === "docInput") && !settingEnabled("files")) {
        return featureBlocked("File Sharing");
      }
      const input = $(id);
      if (!input) return;
      input.value = "";
      input.click();
    }

    async function openCameraSheet() {
      closeAllMenus();
      if (!settingEnabled("camera")) return featureBlocked("Camera");
      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        showToast("Opening mobile camera picker");
        return triggerInput("cameraInput");
      }
      $("cameraModal").classList.add("active");
      renderCameraPreviewStrip();
      try {
        await startCameraStream();
      } catch (err) {
        closeCameraSheet();
        showToast("Please allow camera permission in your phone/browser settings, then open Camera again.", { force: true, duration: 3200 });
        setTimeout(() => triggerInput("cameraInput"), 100);
      }
    }

    async function startCameraStream() {
      stopCameraStream();
      cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: cameraFacing } }, audio: false });
      $("cameraVideo").srcObject = cameraStream;
    }

    function stopCameraStream() {
      if (cameraStream) cameraStream.getTracks().forEach(track => track.stop());
      cameraStream = null;
    }

    function closeCameraSheet() {
      stopCameraStream();
      $("cameraModal").classList.remove("active");
    }

    function renderCameraPreviewStrip() {
      const strip = $("cameraPreviewStrip");
      if (!strip) return;
      const cameraItems = attachmentsBase64
        .map((att, idx) => ({ att, idx }))
        .filter(x => x.att.type === "image" && x.att.source === "camera");
      if (!cameraItems.length) {
        strip.classList.remove("active");
        strip.innerHTML = "";
        return;
      }
      strip.classList.add("active");
      strip.innerHTML = cameraItems.map(({ att, idx }) => `
        <div class="camera-thumb">
          <img src="${att.dataUrl}" alt="Photo">
          <button onclick="removeAttachment(${idx}); renderCameraPreviewStrip();" aria-label="Remove photo"><i class="fas fa-xmark"></i></button>
        </div>
      `).join("");
    }

    function clearCameraCaptures() {
      attachmentsBase64 = attachmentsBase64.filter(att => att.source !== "camera");
      renderAttachmentPreview();
      renderCameraPreviewStrip();
      handleInputResize();
    }

    function sendCameraCaptures() {
      if (!attachmentsBase64.some(att => att.source === "camera")) return showToast("Capture a photo first");
      closeCameraSheet();
      sendMessage();
    }

    async function flipCamera() {
      cameraFacing = cameraFacing === "environment" ? "user" : "environment";
      try { await startCameraStream(); } catch { showToast("Could not switch camera"); }
    }

    function captureCameraPhoto() {
      if (!settingEnabled("camera")) return featureBlocked("Camera");
      const video = $("cameraVideo");
      if (!video.videoWidth) return showToast("Camera not ready");
      if (!canAddAttachment("image", 1)) return;
      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext("2d").drawImage(video, 0, 0, canvas.width, canvas.height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.9);
      attachmentsBase64.push({ type: "image", mime: "image/jpeg", name: `camera_${Date.now()}.jpg`, dataUrl, source: "camera" });
      noteImageAdded(1);
      renderAttachmentPreview();
      renderCameraPreviewStrip();
      handleInputResize();
      showToast("Photo added");
    }

    function handleFileSelection(e) {
      const inputId = e.target.id;
      const files = Array.from(e.target.files || []);
      if (!files.length) return;
      files.forEach(file => addFileAttachment(file, inputId));
      e.target.value = "";
    }

    function addFileAttachment(file, inputId) {
      if (file.size > MAX_FILE_SIZE) return showToast(`${file.name} is too large. Max 4MB`);
      const isImage = file.type.startsWith("image/");
      const isVideo = file.type.startsWith("video/");
      const isAudio = file.type.startsWith("audio/");

      if (inputId === "cameraInput" && !settingEnabled("camera")) return featureBlocked("Camera");
      if ((inputId === "galleryInput" || inputId === "docInput") && !settingEnabled("files")) return featureBlocked("File Sharing");
      if (inputId === "galleryInput" && !isImage) return showToast("Pic button only accepts images");
      if (inputId === "docInput" && isImage) return showToast("Use Pic for images");
      if ((isVideo || isAudio) && !settingEnabled("music")) return featureBlocked("Music");
      if (!canAddAttachment(isImage ? "image" : "file", 1)) return;

      const reader = new FileReader();
      reader.onload = ev => {
        attachmentsBase64.push({
          name: file.name || `file_${Date.now()}`,
          type: isImage ? "image" : (isVideo ? "video" : (isAudio ? "audio" : "file")),
          mime: file.type || "application/octet-stream",
          size: file.size,
          dataUrl: ev.target.result,
          source: inputId === "cameraInput" ? "camera-picker" : inputId
        });
        if (isImage) noteImageAdded(1);
        renderAttachmentPreview();
        renderCameraPreviewStrip();
        handleInputResize();
      };
      reader.onerror = () => showToast("Could not read file");
      reader.readAsDataURL(file);
    }

    function renderAttachmentPreview() {
      const bar = $("attPreview");
      if (!attachmentsBase64.length) {
        bar.classList.remove("active");
        bar.innerHTML = "";
        return;
      }
      bar.classList.add("active");
      bar.innerHTML = attachmentsBase64.map((att, idx) => {
        let inner = `<i class="fas fa-file-lines file-icon"></i>`;
        if (att.type === "image") inner = `<img src="${att.dataUrl}" alt="pic">`;
        if (att.type === "video") inner = `<i class="fas fa-video file-icon"></i>`;
        if (att.type === "audio") inner = `<i class="fas fa-music file-icon"></i>`;
        return `<div class="att-item">${inner}<button class="att-remove" onclick="removeAttachment(${idx}); renderCameraPreviewStrip();"><i class="fas fa-times"></i></button></div>`;
      }).join("");
    }

    function removeAttachment(idx) {
      attachmentsBase64.splice(idx, 1);
      renderAttachmentPreview();
      renderCameraPreviewStrip();
      handleInputResize();
    }

    function initSwipeListeners() {
      document.querySelectorAll(".msg-row").forEach(row => {
        let startX = 0;
        let isSwiping = false;
        let holdTimer = null;
        const clearHold = () => { if (holdTimer) clearTimeout(holdTimer); holdTimer = null; };

        row.addEventListener("touchstart", e => {
          if (document.body.classList.contains("select-mode")) return;
          startX = e.touches[0].clientX;
          isSwiping = true;
          row.style.transition = "none";
          clearHold();
          holdTimer = setTimeout(() => openMsgMenu(row.dataset.id), 520);
        }, { passive: true });

        row.addEventListener("touchmove", e => {
          if (!isSwiping) return;
          const diff = e.touches[0].clientX - startX;
          if (Math.abs(diff) > 10) clearHold();
          if (diff > 0 && diff < 80) {
            row.style.transform = `translateX(${diff}px)`;
            const icon = row.querySelector(".swipe-reply-icon");
            if (icon) icon.style.opacity = diff / 80;
          }
        }, { passive: true });

        row.addEventListener("touchend", e => {
          clearHold();
          if (!isSwiping) return;
          isSwiping = false;
          const diff = e.changedTouches[0].clientX - startX;
          row.style.transition = "transform .25s cubic-bezier(.25,1,.5,1)";
          row.style.transform = "translateX(0)";
          const icon = row.querySelector(".swipe-reply-icon");
          if (icon) icon.style.opacity = 0;
          if (diff > 50) triggerReply(row.dataset.id);
        }, { passive: true });

        row.addEventListener("touchcancel", clearHold, { passive: true });
        row.addEventListener("contextmenu", e => {
          e.preventDefault();
          openMsgMenu(row.dataset.id);
        });
      });
    }

    function triggerReply(id) {
      if (document.body.classList.contains("select-mode")) return;
      const msg = messages.find(m => m.id === id);
      if (!msg || msg.deletedForAll) return;
      replyingToId = id;
      $("rpSender").textContent = msg.senderUid === myUid ? "You" : (msg.senderName || "User");
      $("rpText").textContent = msg.text || (msg.attachments?.length ? describeAttachment(msg.attachments[0]) : "Message");
      $("replyPreview").classList.add("active");
      $("chatInput").focus();
    }

    function cancelReply() {
      replyingToId = null;
      $("replyPreview").classList.remove("active");
    }

    const ENC_VERSION = "ARYANTA-E2EE-V1";
    let cachedCryptoKey = null;

    function getChatSecret() {
      const saved = safeJson(localStorage.getItem(SETTINGS_KEY), {});
      return String(saved.chatEncryptionKey || localStorage.getItem("aryanta_chat_shared_key") || "aryanta-admin-chat-shared-key-v1");
    }

    function bytesToBase64(bytes) {
      let binary = "";
      const chunk = 0x8000;
      for (let i = 0; i < bytes.length; i += chunk) {
        binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunk));
      }
      return btoa(binary);
    }

    function base64ToBytes(base64) {
      const binary = atob(base64);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function getCryptoKey() {
      const secret = getChatSecret();
      const cacheId = await sha256Text(secret);
      if (cachedCryptoKey && cachedCryptoKey.id === cacheId) return cachedCryptoKey.key;
      const material = await crypto.subtle.importKey("raw", new TextEncoder().encode(secret), "PBKDF2", false, ["deriveKey"]);
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: new TextEncoder().encode("aryanta-admin-chat-salt-v1"), iterations: 120000, hash: "SHA-256" },
        material,
        { name: "AES-GCM", length: 256 },
        false,
        ["encrypt", "decrypt"]
      );
      cachedCryptoKey = { id: cacheId, key };
      return key;
    }

    async function sha256Text(text) {
      const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
      return bytesToBase64(new Uint8Array(hash));
    }

    async function encryptChatPayload(payload) {
      const key = await getCryptoKey();
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const encoded = new TextEncoder().encode(JSON.stringify(payload));
      const encrypted = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, encoded);
      return { v: ENC_VERSION, iv: bytesToBase64(iv), data: bytesToBase64(new Uint8Array(encrypted)) };
    }

    async function decryptChatPayload(packet) {
      if (!packet || packet.v !== ENC_VERSION) throw new Error("Unsupported encrypted message");
      const key = await getCryptoKey();
      const iv = base64ToBytes(packet.iv);
      const data = base64ToBytes(packet.data);
      const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, data);
      return JSON.parse(new TextDecoder().decode(decrypted));
    }

    async function normalizeIncomingMessage(raw) {
      if (!raw) return raw;
      if (raw.encrypted && raw.payloadEnc) {
        try {
          let plain;
          if (decryptedPayloadCache[raw.id]) {
            plain = decryptedPayloadCache[raw.id];
          } else {
            plain = await decryptChatPayload(raw.payloadEnc);
            decryptedPayloadCache[raw.id] = plain;
            if (Object.keys(decryptedPayloadCache).length > 200) {
               delete decryptedPayloadCache[Object.keys(decryptedPayloadCache)[0]];
            }
          }
          
          const merged = { ...raw, ...plain, decrypted: true };
          merged.senderName = getAdminName(merged.senderUid, merged.senderName);
          merged.senderImage = getKnownSenderImage(merged.senderUid, merged.senderImage);
          return merged;
        } catch (err) {
          return {
            ...raw,
            text: "🔒 Encrypted message. Chat key mismatch.",
            attachments: [],
            senderName: getAdminName(raw.senderUid, raw.senderName || "Encrypted User"),
            senderImage: getKnownSenderImage(raw.senderUid, raw.senderImage),
            decryptFailed: true
          };
        }
      }
      return {
        ...raw,
        senderName: getAdminName(raw.senderUid, raw.senderName || "User"),
        senderImage: getKnownSenderImage(raw.senderUid, raw.senderImage)
      };
    }

    async function sendMessage() {
      if (!requireValidChatLogin()) return;
      if (activeChat.type === "direct") {
        const targetProfile = userProfileMap[safeKey(activeChat.uid)] || allUserProfiles.find(p => safeKey(p.uid) === safeKey(activeChat.uid));
        if (!isSafeChatUid(activeChat.uid) || String(activeChat.uid).toLowerCase().startsWith("local-") || !targetProfile || isAdminLikeProfile(targetProfile)) {
          showToast("Cannot send here. Direct chat is only for normal users; admins are in Admin Group.", { force: true, duration: 4200 });
          return;
        }
      }

      const chatPath = getActiveChatPath();
      if (!chatPath) {
        showToast("Invalid chat path. Message not sent.", { force: true, duration: 4200 });
        return;
      }

      const text = $("chatInput").value.trim();
      if (!text && attachmentsBase64.length === 0) return;
      if (attachmentsBase64.length > MAX_ATTACHMENTS) return showToast(`Maximum ${MAX_ATTACHMENTS} files allowed`, { force: true });

      myImage = resolveMyProfileImage();
      updateMyChatProfile();

      const msgId = `MSG-${Date.now()}-${Math.floor(Math.random() * 10000)}`;
      const outgoingAttachments = attachmentsBase64.map(att => ({ ...att }));
      const plainPayload = {
        senderName: myName,
        senderImage: myImage,
        text,
        attachments: outgoingAttachments,
        replyTo: replyingToId,
        timestamp: Date.now(),
        chatType: activeChat.type,
        chatId: activeChat.id || "group",
        targetUid: activeChat.type === "direct" ? activeChat.uid : "all_admins"
      };
      
      let encryptedPayload;
      try {
        encryptedPayload = await encryptChatPayload(plainPayload);
      } catch (err) {
        return showToast("Encryption failed. Message not sent", { force: true });
      }

      const payload = {
        id: msgId,
        senderUid: myUid,
        senderName: myName,
        senderImage: myImage,
        timestamp: plainPayload.timestamp,
        chatType: activeChat.type,
        chatId: activeChat.id || "group",
        targetUid: activeChat.type === "direct" ? activeChat.uid : "all_admins",
        replyTo: replyingToId,
        encrypted: true,
        payloadEnc: encryptedPayload,
        deletedForAll: false,
        reactions: {},
        stars: {}
      };
      
      try {
        await db.ref(`${chatPath}/${msgId}`).set(payload);
        if (!typingRemoteDisabled) await db.ref(`${getTypingPathForActiveChat()}/${myKey}`).remove().catch(() => { typingRemoteDisabled = true; });
        $("chatInput").value = "";
        $("chatInput").style.height = "auto";
        attachmentsBase64 = [];
        renderAttachmentPreview();
        renderCameraPreviewStrip();
        cancelReply();
        handleInputResize();
        scrollToBottom();
      } catch (err) {
        const message = String(err && (err.message || err.code || err) || "");
        if (message.includes("permission_denied") || message.includes("PERMISSION_DENIED")) {
          showToast("Firebase rules blocked this write. Update RTDB rules for admin_chats/admin_direct_chats and avoid local IDs.", { force: true, duration: 5600 });
        } else {
          showToast("Failed to send message: " + message, { force: true, duration: 4200 });
        }
      }
    }

    function listenForMessages() {
      const path = getActiveChatPath();
      if (!path) {
        showToast("Invalid chat path. Cannot load this chat.", { force: true, duration: 4200 });
        return;
      }
      activeMessageRef = db.ref(path).orderByChild("timestamp").limitToLast(180);
      activeMessageRef.on("value", async snap => {
        const data = snap.val() || {};
        const rawMessages = Object.values(data).filter(Boolean).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        const normalized = await Promise.all(rawMessages.map(normalizeIncomingMessage));
        messages = normalized.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));

        const newestTs = messages.reduce((max, m) => Math.max(max, Number(m.timestamp || 0)), 0);
        if (firstMessageLoadDone) {
          messages
            .filter(m => Number(m.timestamp || 0) > lastKnownMessageTs && m.senderUid !== myUid && !m.deletedForAll)
            .forEach(m => notifyIncomingMessage(m)); // Alert for all new messages missed
        }
        lastKnownMessageTs = Math.max(lastKnownMessageTs, newestTs);
        firstMessageLoadDone = true;
        renderMessages();
      }, (err) => {
         if(err.message && err.message.includes("permission_denied")) {
             showToast("Permission denied reading this chat.", { force: true });
         } else {
             showToast("Could not load chat", { force: true });
         }
      });
    }

    function formatTime(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
    }

    function formatSmartTime(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const today = new Date();
      const yest = new Date(today); yest.setDate(yest.getDate() - 1);
      const time = d.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });
      if (d.toDateString() === today.toDateString()) return `Today at ${time}`;
      if (d.toDateString() === yest.toDateString()) return `Yesterday at ${time}`;
      return `${d.toLocaleDateString("en-IN", { day: "numeric", month: "short" })} at ${time}`;
    }

    function formatDateBanner(ts) {
      if (!ts) return "";
      const d = new Date(ts);
      const today = new Date();
      const yest = new Date(today); yest.setDate(yest.getDate() - 1);
      if (d.toDateString() === today.toDateString()) return "Today";
      if (d.toDateString() === yest.toDateString()) return "Yesterday";
      return d.toLocaleDateString("en-IN", { weekday: "short", day: "numeric", month: "short", year: "numeric" });
    }

    function visibleMessages() {
      return messages.filter(m => {
        if (!m || m.timestamp < chatClearedAt) return false;
        if (m.deletedFor && Object.values(m.deletedFor).includes(myUid)) return false;
        return true;
      });
    }

    function renderMessages() {
      const box = $("chatBox");
      const wasAtBottom = box.scrollHeight - box.scrollTop <= box.clientHeight + 120;
      let html = "";
      let lastDate = "";
      visibleMessages().forEach(m => {
        const isMe = m.senderUid === myUid;
        const msgDate = formatDateBanner(m.timestamp);
        if (msgDate !== lastDate) {
          html += `<div class="date-divider"><span>${msgDate}</span></div>`;
          lastDate = msgDate;
        }
        const alignClass = isMe ? "out" : "in";
        const isSelected = selectedMsgIds.has(m.id) ? "checked" : "";
        const avatar = escapeHtml(getMessageAvatar(m));
        const avatarFallback = `onerror="this.onerror=null;this.src='${ARYANTA_LOGO}'"`;
        html += `<div class="msg-row ${alignClass} with-avatar" data-id="${escapeHtml(m.id)}" onclick="toggleMsgSelection(event, '${escapeHtml(m.id)}')">`;
        html += `<div class="msg-checkbox ${isSelected}"></div><div class="swipe-reply-icon"><i class="fas fa-reply"></i></div>`;
        if (!isMe) html += `<img class="msg-avatar" src="${avatar}" ${avatarFallback} alt="${escapeHtml(m.senderName || 'User')}">`;
        html += `<div class="bubble" onclick="handleBubbleClick(event, '${escapeHtml(m.id)}')" ondblclick="quickHeart(event, '${escapeHtml(m.id)}')">`;
        html += renderBubbleInner(m, isMe);
        html += `</div>`;
        if (isMe) html += `<img class="msg-avatar" src="${avatar}" ${avatarFallback} alt="You">`;
        html += `</div>`;
      });
      html += `<div class="typing-pill" id="typingPill"><span id="typingText">Typing</span><span class="typing-dots"><span></span><span></span><span></span></span></div>`;
      box.innerHTML = html;
      initSwipeListeners();
      if (wasAtBottom) scrollToBottom();
    }

    function renderBubbleInner(m, isMe) {
      let inner = "";
      if (m.deletedForAll) {
        inner += `<div class="msg-deleted"><i class="fas fa-ban"></i> This message was deleted</div>`;
      } else {
        inner += `<span class="msg-sender">${escapeHtml(isMe ? "You" : (m.senderName || "User"))}</span>`;
        if (m.replyTo) inner += renderQuote(m.replyTo);
        if (Array.isArray(m.attachments)) {
          m.attachments.forEach((att, idx) => inner += renderAttachment(m.id, att, idx));
        }
        if (m.text) inner += `<div class="msg-text">${formatMessageText(m.text)}</div>`;
        inner += renderReactions(m);
      }
      const star = m.stars && m.stars[myKey] ? `<i class="fas fa-star msg-star"></i>` : "";
      inner += `<div class="msg-meta"><span class="msg-date-rich">${star}${formatSmartTime(m.timestamp)}</span> ${isMe && !m.deletedForAll ? '<i class="fas fa-check-double" style="color:var(--primary)"></i>' : ''}</div>`;
      return inner;
    }

    function renderQuote(replyId) {
      const rMsg = messages.find(rm => rm.id === replyId);
      if (!rMsg || rMsg.deletedForAll) return "";
      const rName = rMsg.senderUid === myUid ? "You" : (rMsg.senderName || "User");
      const rText = rMsg.text || (rMsg.attachments?.length ? describeAttachment(rMsg.attachments[0]) : "Message");
      return `<div class="quote-box" onclick="event.stopPropagation(); scrollToMsg('${escapeHtml(replyId)}')"><div class="quote-sender">${escapeHtml(rName)}</div><div class="quote-text">${escapeHtml(rText)}</div></div>`;
    }

    function renderAttachment(msgId, att, idx) {
      if (!att) return "";
      if ((att.type === "video" || att.type === "audio") && !settingEnabled("music")) {
        return `<div class="blocked-attachment"><i class="fas fa-ban"></i><span>Music/media is disabled in Admin Settings</span></div>`;
      }
      if (att.type === "image") {
        return `<div class="msg-attachment"><img src="${att.dataUrl}" alt="${escapeHtml(att.name || 'pic')}" onclick="openMessageAttachment(event, '${escapeHtml(msgId)}', ${idx})"></div>`;
      }
      if (att.type === "video") {
        return `<div class="msg-attachment"><video class="msg-video" src="${att.dataUrl}" controls onclick="event.stopPropagation()"></video></div>`;
      }
      if (att.type === "audio") {
        return `<div class="msg-file" onclick="event.stopPropagation()"><i class="fas fa-music"></i><div><audio src="${att.dataUrl}" controls></audio></div></div>`;
      }
      return `<button class="msg-file" onclick="openMessageAttachment(event, '${escapeHtml(msgId)}', ${idx})"><i class="fas fa-file-lines"></i><div>${escapeHtml(att.name || 'File')}</div></button>`;
    }

    function describeAttachment(att) {
      if (!att) return "Attachment";
      if (att.type === "image") return "Photo";
      if (att.type === "video") return "Video";
      return att.name || "File";
    }

    function formatMessageText(text) {
      return escapeHtml(text).replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:#3b82f6;text-decoration:underline;" onclick="event.stopPropagation()">$1</a>');
    }

    function renderReactions(m) {
      const reactions = m.reactions || {};
      const counts = {};
      Object.values(reactions).forEach(emoji => { if (emoji) counts[emoji] = (counts[emoji] || 0) + 1; });
      const keys = Object.keys(counts);
      if (!keys.length) return "";
      return `<div class="msg-reactions">${keys.map(e => `<span class="msg-reaction-pill">${escapeHtml(e)} ${counts[e]}</span>`).join("")}</div>`;
    }

    function handleBubbleClick(e, id) {
      e.stopPropagation();
      if (document.body.classList.contains("select-mode")) return toggleMsgSelection(e, id);
      const now = Date.now();
      if (lastTap.id === id && now - lastTap.time < 300) return quickHeart(e, id);
      lastTap = { id, time: now };
    }

    function quickHeart(e, id) {
      e.stopPropagation();
      selectedMsgId = id;
      reactToSelected("❤️");
    }

    function scrollToBottom() {
      const box = $("chatBox");
      if (box) {
         box.scrollTo({ top: box.scrollHeight, behavior: "smooth" });
      }
    }

    function scrollToMsg(id) {
      const row = document.querySelector(`.msg-row[data-id="${CSS.escape(id)}"]`);
      if (row) {
        row.scrollIntoView({ behavior: "smooth", block: "center" });
        const bub = row.querySelector(".bubble");
        const oldShadow = bub.style.boxShadow;
        bub.style.boxShadow = "0 0 0 3px var(--warning)";
        setTimeout(() => bub.style.boxShadow = oldShadow, 1000);
      }
    }

    function openMsgMenu(id) {
      const msg = messages.find(m => m.id === id);
      if (!msg || msg.deletedForAll) return;
      selectedMsgId = id;
      $("btnDelEveryone").style.display = msg.senderUid === myUid ? "flex" : "none";
      closeAllMenus();
      $("msgMenu").classList.add("active");
      $("mainOverlay").classList.add("active");
    }

    function initiateReplyFromMenu() { triggerReply(selectedMsgId); closeAllMenus(); }

    function copyMsgText() {
      const msg = messages.find(m => m.id === selectedMsgId);
      if (!msg || !msg.text) { closeAllMenus(); return showToast("No text to copy"); }
      navigator.clipboard.writeText(msg.text).then(() => showToast("Copied"), () => showToast("Copy failed"));
      closeAllMenus();
    }

    async function reactToSelected(emoji) {
      if (!selectedMsgId) return;
      const chatPath = getActiveChatPath();
      if (!chatPath) return showToast("Invalid chat path", { force: true });
      try {
        const msg = messages.find(m => m.id === selectedMsgId);
        const current = msg?.reactions?.[myKey];
        await db.ref(`${chatPath}/${selectedMsgId}/reactions/${myKey}`).set(current === emoji ? null : emoji);
        closeAllMenus();
      } catch { showToast("Reaction failed"); }
    }

    async function toggleStarSelected() {
      if (!selectedMsgId) return;
      const chatPath = getActiveChatPath();
      if (!chatPath) return showToast("Invalid chat path", { force: true });
      try {
        const msg = messages.find(m => m.id === selectedMsgId);
        const current = !!(msg?.stars && msg.stars[myKey]);
        await db.ref(`${chatPath}/${selectedMsgId}/stars/${myKey}`).set(current ? null : true);
        closeAllMenus();
        showToast(current ? "Unstarred" : "Starred");
      } catch { showToast("Could not update star"); }
    }

    async function deleteMsg(type) {
      if (!selectedMsgId) return;
      const chatPath = getActiveChatPath();
      if (!chatPath) return showToast("Invalid chat path", { force: true });
      try {
        if (type === "all") await db.ref(`${chatPath}/${selectedMsgId}`).update({ deletedForAll: true, text: "", attachments: null });
        else await db.ref(`${chatPath}/${selectedMsgId}/deletedFor`).push(myUid);
        closeAllMenus();
      } catch { showToast("Delete failed"); }
    }

    function clearChat() {
      if (!confirm("Clear all chat history only on this device?")) return;
      chatClearedAt = Date.now();
      localStorage.setItem(`chat_cleared_${myKey}_${safeKey(activeChat.id || activeChat.type)}`, chatClearedAt);
      renderMessages();
      closeAllMenus();
      showToast("Chat cleared");
    }

    function openMessageAttachment(e, msgId, idx) {
      e.stopPropagation();
      const msg = messages.find(m => m.id === msgId);
      const att = msg?.attachments?.[idx];
      if (!att) return showToast("Attachment missing");
      if (att.type === "file" && !settingEnabled("files")) return featureBlocked("File Sharing");
      if ((att.type === "video" || att.type === "audio") && !settingEnabled("music")) return featureBlocked("Music");
      if (att.type === "image") return openImage(e, att.dataUrl, att.name || "Aryanta_Chat_Image.jpg");
      openFileViewer(att);
    }

    function openImage(e, url, name = "Aryanta_Chat_Image.jpg") {
      e.stopPropagation();
      $("ivImg").src = url;
      $("ivDownloadBtn").onclick = () => downloadDataUrl(url, name);
      $("imageViewer").classList.add("active");
      try { history.pushState({ aryantaChat: true, layer: "image" }, ""); } catch {}
    }

    function closeImageViewer() { $("imageViewer").classList.remove("active"); $("ivImg").src = ""; }

    function openFileViewer(att) {
      $("fvTitle").textContent = att.name || "File";
      $("fvDownloadBtn").onclick = () => downloadDataUrl(att.dataUrl, att.name || "Aryanta_File");
      const body = $("fvBody");
      body.innerHTML = "";
      const mime = att.mime || "";
      if (mime.includes("pdf") || mime.startsWith("text/") || /\.(txt|csv|json|html|css|js)$/i.test(att.name || "")) {
        body.innerHTML = `<iframe src="${att.dataUrl}" title="${escapeHtml(att.name || 'File')}"></iframe>`;
      } else {
        body.innerHTML = `<div class="file-card"><i class="fas fa-file-lines"></i><strong>${escapeHtml(att.name || 'File')}</strong><p>This file type may not preview in browser. Open or download it below.</p><button onclick="downloadCurrentViewedFile()">Download File</button></div>`;
      }
      window.__currentViewedFile = att;
      $("fileViewer").classList.add("active");
      try { history.pushState({ aryantaChat: true, layer: "file" }, ""); } catch {}
    }

    function downloadCurrentViewedFile() {
      if (window.__currentViewedFile) downloadDataUrl(window.__currentViewedFile.dataUrl, window.__currentViewedFile.name || "Aryanta_File");
    }

    function closeFileViewer() { $("fileViewer").classList.remove("active"); }

    function downloadDataUrl(url, name) {
      const a = document.createElement("a");
      a.href = url;
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
    }

    function openSearchMenu() {
      closeAllMenus();
      $("searchMenu").classList.add("active");
      $("mainOverlay").classList.add("active");
      $("searchInput").value = "";
      $("searchResults").innerHTML = `<div class="search-result"><strong>Search</strong><span>Type to find text, file names, or links.</span></div>`;
      setTimeout(() => $("searchInput").focus(), 250);
    }

    function runMessageSearch() {
      const q = $("searchInput").value.trim().toLowerCase();
      const results = $("searchResults");
      if (!q) { results.innerHTML = ""; return; }
      const found = visibleMessages().filter(m => {
        const parts = [m.text || "", m.senderName || "", ...(m.attachments || []).map(a => a.name || "")];
        return parts.join(" ").toLowerCase().includes(q);
      }).slice(-30).reverse();
      if (!found.length) {
        results.innerHTML = `<div class="search-result"><strong>No result</strong><span>Try another word.</span></div>`;
        return;
      }
      results.innerHTML = found.map(m => `<button class="search-result" onclick="closeAllMenus(); scrollToMsg('${escapeHtml(m.id)}')"><strong>${escapeHtml(m.senderUid === myUid ? 'You' : (m.senderName || 'User'))} • ${formatTime(m.timestamp)}</strong><span>${escapeHtml(m.text || (m.attachments?.[0]?.name || 'Attachment'))}</span></button>`).join("");
    }

    function setupPresence() {
      if (!isRealAdminUid(myUid)) return;
      const base = getPresencePathForActiveChat();
      activePresenceRef = db.ref(`${base}/${myKey}`);
      activePresenceRef.set({ name: myName, uid: myUid, image: myImage, ts: Date.now(), online: true }).catch(() => {});
      activePresenceRef.onDisconnect().remove();
      setInterval(() => {
        if (activePresenceRef) activePresenceRef.update({ ts: Date.now(), online: true }).catch(() => {});
      }, 25000);
    }

    function sendTypingSignal() {
      if (typingRemoteDisabled) return;
      const text = $("chatInput").value.trim();
      clearTimeout(typingTimer);
      const base = getTypingPathForActiveChat();
      if (!text) {
        db.ref(`${base}/${myKey}`).remove().catch(() => { typingRemoteDisabled = true; });
        return;
      }
      db.ref(`${base}/${myKey}`).set({ name: myName, uid: myUid, image: myImage, ts: Date.now() }).catch(() => { typingRemoteDisabled = true; });
      typingTimer = setTimeout(() => db.ref(`${base}/${myKey}`).remove().catch(() => { typingRemoteDisabled = true; }), 1800);
    }

    function listenTyping() {
      const base = getTypingPathForActiveChat();
      activeTypingRef = db.ref(base);
      activeTypingRef.on("value", snap => {
        const data = snap.val() || {};
        const now = Date.now();
        const names = Object.entries(data)
          .filter(([key, val]) => key !== myKey && val && now - Number(val.ts || 0) < 3500)
          .map(([, val]) => val.name || "Someone");
        const pill = $("typingPill");
        if (!pill) return;
        if (names.length) {
          $("typingText").textContent = `${names.slice(0,2).join(", ")} typing`;
          pill.classList.add("active");
          scrollToBottom();
        } else {
          pill.classList.remove("active");
        }
      });
    }

    function setupListeners() {
      $("cameraInput").addEventListener("change", handleFileSelection);
      $("galleryInput").addEventListener("change", handleFileSelection);
      $("docInput").addEventListener("change", handleFileSelection);
      $("chatInput").addEventListener("focus", handleInputResize);
      $("chatInput").addEventListener("blur", () => setTimeout(handleInputResize, 120));
      $("chatInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      
      $("chatBox")?.addEventListener("scroll", () => {
        const box = $("chatBox");
        const jump = $("jumpActions");
        if (jump && box) {
          const distanceFromBottom = box.scrollHeight - box.scrollTop - box.clientHeight;
          if (distanceFromBottom > 150) {
            jump.classList.add("visible");
          } else {
            jump.classList.remove("visible");
          }
        }
      });
      
      window.addEventListener("offline", () => showToast("Internet is offline. Messages will load when connection returns.", { force: true, duration: 3500 }));
      window.addEventListener("online", () => showToast("Back online. Syncing chat.", { force: true, duration: 2200 }));
      document.addEventListener("keydown", e => { if (e.key === "Escape") closeTopLayer(); });
      window.addEventListener("beforeunload", () => {
        try {
          if (!typingRemoteDisabled) db.ref(`${getTypingPathForActiveChat()}/${myKey}`).remove();
          if (activePresenceRef) activePresenceRef.remove();
        } catch {}
      });
    }

    initApp();
  </script>
</body>
</html>
