<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Aryanta Links</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #008080;
      --primary-dark: #006b6b;
      --primary-light: #00b8b8;
      --bg: #f4fbfb;
      --card: #ffffff;
      --card-soft: rgba(255, 255, 255, 0.86);
      --text: #101828;
      --muted: #667085;
      --border: #d9e7e7;
      --danger: #ef4444;
      --success: #16a34a;
      --warning: #f59e0b;
      --soft: rgba(0, 128, 128, 0.10);
      --shadow: 0 18px 45px rgba(16, 24, 40, 0.12);
      --shadow-soft: 0 8px 22px rgba(16, 24, 40, 0.08);
      --top-safe: max(14px, env(safe-area-inset-top));
      --bottom-safe: max(12px, env(safe-area-inset-bottom));
    }

    html[data-theme="dark"] {
      --bg: #081314;
      --card: #111d1f;
      --card-soft: rgba(17, 29, 31, 0.88);
      --text: #f8fafc;
      --muted: #98a2b3;
      --border: rgba(255, 255, 255, 0.12);
      --soft: rgba(0, 184, 184, 0.14);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.40);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100%; font-family: system-ui, -apple-system, sans-serif; color: var(--text); background: linear-gradient(160deg, #effafa 0%, #ffffff 45%, #e9f7f7 100%); overscroll-behavior: none; }
    html[data-theme="dark"] body { background: linear-gradient(160deg, #071112 0%, #101c1e 48%, #091718 100%); }
    button, input, textarea { font: inherit; outline: none; border: none; }
    button { cursor: pointer; touch-action: manipulation; }
    img { user-select: none; -webkit-user-drag: none; }
    .fas, .fa-solid, .fab { display: inline-block !important; line-height: 1 !important; }

    .app { width: 100%; min-height: 100dvh; padding: var(--top-safe) 12px calc(90px + var(--bottom-safe)); overflow-x: hidden; position: relative; isolation: isolate; }
    .app::before, .app::after { content: ""; position: fixed; border-radius: 999px; pointer-events: none; z-index: -1; }
    .app::before { width: 180px; height: 180px; top: -62px; right: -72px; background: rgba(0, 128, 128, 0.14); }
    .app::after { width: 170px; height: 170px; left: -70px; bottom: -60px; background: rgba(0, 184, 184, 0.12); }

    .wrap { width: 100%; max-width: 430px; margin: 0 auto; display: grid; gap: 12px; }

    .topbar { min-height: 56px; display: grid; grid-template-columns: 45px minmax(0, 1fr) auto; align-items: center; gap: 9px; }
    .icon-btn { width: 45px; height: 45px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); color: var(--primary); box-shadow: var(--shadow-soft); display: inline-flex; align-items: center; justify-content: center; font-size: 16px; transition: 0.15s; }
    .icon-btn:active, .mini-action:active, .wide-action:active, .tab:active { transform: scale(0.96); }
    .icon-btn.danger { color: var(--danger); background: rgba(239, 68, 68, 0.08); }
    .icon-btn.success { color: var(--success); background: rgba(22, 163, 74, 0.08); }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo { width: 44px; height: 44px; border-radius: 16px; padding: 4px; background: #ffffff; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
    .brand-logo img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }
    .brand h1 { font-size: 17px; font-weight: 950; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand p { margin-top: 2px; color: var(--muted); font-size: 10px; font-weight: 900; text-transform: uppercase; }

    .top-actions { display: flex; gap: 7px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow-soft); overflow: hidden; }

    .hero { padding: 14px; display: grid; grid-template-columns: 58px minmax(0, 1fr); align-items: center; gap: 12px; background: linear-gradient(145deg, var(--primary-dark), var(--primary), var(--primary-light)); color: #ffffff; position: relative; }
    .hero::after { content: ""; position: absolute; right: -45px; top: -58px; width: 142px; height: 142px; border-radius: 999px; background: rgba(255, 255, 255, 0.13); pointer-events: none; }
    .hero-mark { width: 58px; height: 58px; border-radius: 20px; background: rgba(255, 255, 255, 0.18); border: 1px solid rgba(255, 255, 255, 0.20); display: flex; align-items: center; justify-content: center; font-size: 24px; position: relative; z-index: 1; }
    .hero-copy { min-width: 0; position: relative; z-index: 1; }
    .hero-copy h2 { font-size: 20px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hero-copy p { margin-top: 5px; font-size: 12px; font-weight: 760; opacity: 0.92; }
    .status-pill { width: fit-content; min-height: 27px; margin-top: 9px; padding: 0 10px; border-radius: 999px; display: inline-flex; align-items: center; gap: 7px; background: rgba(255, 255, 255, 0.16); border: 1px solid rgba(255, 255, 255, 0.18); font-size: 10.5px; font-weight: 950; }

    .panel { padding: 13px; display: grid; gap: 11px; }
    .panel-title { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .panel-title h3 { font-size: 15px; font-weight: 950; display: inline-flex; align-items: center; gap: 8px; min-width: 0; }
    .panel-title h3 i { color: var(--primary); }
    .panel-title span { padding: 4px 9px; border-radius: 999px; background: var(--soft); color: var(--primary); font-size: 9.5px; font-weight: 950; white-space: nowrap; }

    .search-box { min-height: 45px; border-radius: 17px; border: 1px solid var(--border); background: var(--card-soft); display: grid; grid-template-columns: 38px minmax(0, 1fr); align-items: center; padding: 0 10px; color: var(--muted); }
    .search-box input { min-width: 0; border: 0; background: transparent; color: var(--text); font-size: 12px; font-weight: 760; }

    .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 7px; }
    .tab { min-height: 38px; border-radius: 14px; background: var(--card-soft); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 800; transition: 0.2s ease;}
    .tab.active { background: var(--primary); border-color: var(--primary); color: #ffffff; }

    .link-list { display: grid; gap: 9px; min-height: 90px; }
    .link-item { display: grid; grid-template-columns: 62px minmax(0, 1fr); gap: 11px; padding: 10px; border-radius: 20px; border: 1px solid var(--border); background: var(--card-soft); overflow: hidden; }
    .link-logo { width: 62px; height: 62px; border-radius: 18px; background: var(--soft); border: 1px solid var(--border); color: var(--primary); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 22px; cursor: pointer; flex: 0 0 auto; }
    .link-logo img { width: 100%; height: 100%; object-fit: cover; }

    .link-main { min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 8px;}
    .link-meta strong { display: block; font-size: 13px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-meta span { display: block; margin-top: 4px; color: var(--muted); font-size: 10.5px; font-weight: 760; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-actions { display: flex; gap: 6px; }
    .mini-action { flex: 1; min-height: 32px; border-radius: 12px; background: var(--soft); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; gap: 5px; }
    .mini-action.success { background: rgba(22, 163, 74, 0.10); color: var(--success); }
    .mini-action.danger { background: rgba(239, 68, 68, 0.08); color: var(--danger); }

    .empty { min-height: 108px; border-radius: 20px; border: 1px dashed var(--border); background: var(--card-soft); display: grid; place-items: center; text-align: center; padding: 16px; }
    .empty i { color: var(--primary); font-size: 22px; margin-bottom: 8px; }
    .empty strong { display: block; font-size: 13px; font-weight: 950; }
    .empty span { display: block; margin-top: 5px; color: var(--muted); font-size: 11px; }

    .bottom-nav { position: fixed; left: 12px; right: 12px; bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 20; height: 66px; border-radius: 24px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 7px; }
    .nav-btn { border-radius: 18px; background: transparent; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.2s ease; }
    .nav-btn .mini-mark { width: 26px; height: 26px; border-radius: 10px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .nav-btn .btn-text { font-size: 10px; font-weight: 800; text-transform: uppercase; }
    .nav-btn.active { background: var(--soft); color: var(--primary); }

    .toast-holder { position: fixed; left: 12px; right: 12px; top: calc(10px + env(safe-area-inset-top)); z-index: 9999; pointer-events: none; display: flex; justify-content: center; }
    .toast { width: min(430px, calc(100vw - 24px)); min-height: 45px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 10px 12px; display: flex; align-items: center; gap: 8px; color: var(--text); font-size: 12.5px; font-weight: 850; opacity: 0; transform: translateY(-14px); transition: 0.2s ease; pointer-events: auto; }
    .toast.show { opacity: 1; transform: translateY(0); }

    .modal { position: fixed; inset: 0; z-index: 99999; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(0, 0, 0, 0.58); backdrop-filter: blur(5px); }
    .modal.show { display: flex; }
    .modal-card { width: min(430px, 100%); max-height: 86dvh; border-radius: 26px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    .modal-head { min-height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border-bottom: 1px solid var(--border); flex: 0 0 auto;}
    .modal-head strong { font-size: 14px; font-weight: 950; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding-right: 12px; }
    .modal-body { padding: 13px; overflow: auto; flex: 1 1 auto; background: var(--bg); }
    .form-grid { display: grid; gap: 10px; }
    .form-field { display: grid; gap: 6px; }
    .form-field label { color: var(--muted); font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.3px; }
    .form-field input, .form-field textarea { width: 100%; min-height: 44px; border-radius: 15px; border: 1px solid var(--border); background: var(--card-soft); color: var(--text); padding: 0 12px; font-size: 13px; font-weight: 760; }
    .form-field textarea { min-height: 78px; padding: 12px; resize: vertical; }
    .wide-action { min-height: 42px; border-radius: 14px; border: 1px solid var(--border); background: var(--soft); color: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 800; gap: 8px; flex: 1; }
    .wide-action.success { background: var(--success); color: white; border-color: var(--success);}
    .preview-card { display: grid; gap: 12px; }
    .preview-logo { width: 86px; height: 86px; border-radius: 25px; margin: 0 auto; background: var(--soft); color: var(--primary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; font-size: 34px; }
    .preview-logo img { width: 100%; height: 100%; object-fit: cover; }
    .preview-title { text-align: center; }
    .preview-title h3 { font-size: 20px; font-weight: 950; }
    .preview-title p { margin-top: 6px; color: var(--muted); font-size: 12px; font-weight: 760; word-break: break-word; }
    .preview-desc { border-radius: 18px; border: 1px solid var(--border); background: var(--card-soft); padding: 12px; color: var(--muted); font-size: 12px; font-weight: 760; line-height: 1.5; }

    .spinner { width: 16px; height: 16px; border-radius: 999px; border: 2px solid rgba(0, 128, 128, 0.18); border-top-color: var(--primary); animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (min-width: 520px) { .bottom-nav { width: 430px; left: 50%; right: auto; transform: translateX(-50%); } }
  </style>
</head>
<body>
  <div id="toastHolder" class="toast-holder"></div>

  <main class="app">
    <div class="wrap">

      <header id="topbar" class="topbar">
        <button class="icon-btn" onclick="goPage('admin.html')"><i class="fas fa-arrow-left"></i></button>
        <div class="brand">
          <div class="brand-logo"><img src="https://aryanta.in/vurify/aryanta.jpeg" alt="Aryanta" /></div>
          <div>
            <h1>Aryanta Links</h1>
            <p>Social Link Manager</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-btn success" onclick="openAddModal()"><i class="fas fa-plus"></i></button>
          <button class="icon-btn" onclick="loadLinks()"><i id="refreshIcon" class="fas fa-rotate"></i></button>
        </div>
      </header>

      <section class="hero card">
        <div class="hero-mark"><i class="fas fa-link"></i></div>
        <div class="hero-copy">
          <h2 id="pageTitle">Link Directory</h2>
          <p id="pageSub">Open all social, website and company links added by admin.</p>
          <div class="status-pill"><i class="fas fa-database"></i><span id="dbStatus">Connecting...</span></div>
        </div>
      </section>

      <section class="panel card">
        <div class="panel-title">
          <h3><i class="fas fa-list-check"></i> DB Links</h3>
          <span id="listCount">0 ITEMS</span>
        </div>

        <div style="display: grid; grid-template-columns: minmax(0, 1fr) 45px; gap: 8px; margin-bottom: 10px;">
          <div class="search-box">
            <i class="fas fa-magnifying-glass"></i>
            <input id="searchInput" type="search" placeholder="Search links..." oninput="renderLinks()" />
          </div>
          <button class="icon-btn" onclick="loadLinks()"><i class="fas fa-arrows-rotate"></i></button>
        </div>

        <div class="tabs">
          <button id="tabAll" class="tab active" onclick="setFilter('all')"><i class="fas fa-border-all"></i> All</button>
          <button id="tabSocial" class="tab" onclick="setFilter('social')"><i class="fas fa-share-nodes"></i> Social</button>
          <button id="tabWeb" class="tab" onclick="setFilter('web')"><i class="fas fa-globe"></i> Web</button>
        </div>

        <div id="linkList" class="link-list"></div>
      </section>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="nav-btn" onclick="goPage('admin.html')">
      <span class="mini-mark"><i class="fa-solid fa-house"></i></span><span class="btn-text">Home</span>
    </button>
    <button class="nav-btn" onclick="goPage('admin.html#profile')">
      <span class="mini-mark"><i class="fa-solid fa-user"></i></span><span class="btn-text">Profile</span>
    </button>
    <button class="nav-btn" onclick="goPage('x.html')">
      <span class="mini-mark"><i class="fa-solid fa-comments"></i></span><span class="btn-text">Chat</span>
    </button>
  </nav>

  <div id="previewModal" class="modal" onclick="closeModalOnBackdrop(event, 'previewModal')">
    <div class="modal-card">
      <div class="modal-head">
        <strong id="previewHead">Link Details</strong>
        <button class="icon-btn danger" onclick="closeModal('previewModal')"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="preview-card">
          <div id="previewLogo" class="preview-logo"><i class="fas fa-link"></i></div>
          <div class="preview-title">
            <h3 id="previewTitle">Link Title</h3>
            <p id="previewUrl">https://</p>
            <p id="previewDate">Added recently</p>
          </div>
          <div id="previewDesc" class="preview-desc" style="display:none;"></div>
          <div style="display:flex; gap: 8px;">
            <button id="previewOpenBtn" class="wide-action success"><i class="fas fa-up-right-from-square"></i> Open Link</button>
            <button id="previewCopyBtn" class="wide-action"><i class="fas fa-copy"></i> Copy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="addModal" class="modal" onclick="closeModalOnBackdrop(event, 'addModal')">
    <div class="modal-card">
      <div class="modal-head">
        <strong>Add New Link</strong>
        <button class="icon-btn danger" onclick="closeModal('addModal')"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <form class="form-grid" onsubmit="saveLink(event)">
          <div class="form-field">
            <label>Title</label>
            <input id="linkTitleInput" type="text" placeholder="Instagram, YouTube, Support..." required />
          </div>
          <div class="form-field">
            <label>Link URL</label>
            <input id="linkUrlInput" type="url" placeholder="https://example.com" required />
          </div>
          <div class="form-field">
            <label>Logo URL / Image Link</label>
            <input id="linkLogoInput" type="text" placeholder="https://... or blank for auto icon" />
          </div>
          <div class="form-field">
            <label>Description</label>
            <textarea id="linkDescInput" placeholder="Optional note about this link"></textarea>
          </div>
          <button id="saveBtn" class="wide-action success" type="submit"><i class="fas fa-save"></i> Save Link</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://rough-field-c679.official-aryanta.workers.dev";

    const firebaseConfig = {
      apiKey: "AIzaSyBwOOlSdVEgGiUdrr4thPRvILNLcLnfqbc",
      authDomain: "aryanta.firebaseapp.com",
      databaseURL: "https://aryanta-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aryanta",
      storageBucket: "aryanta.firebasestorage.app",
      messagingSenderId: "1072021816522",
      appId: "1:1072021816522:web:8f831cf4d61a7b0f8de033",
      measurementId: "G-XD01NH45VR"
    };

    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const SETTINGS_KEY = "aryanta_admin_settings";
    const TOKEN_KEY = "aryanta_admin_worker_token";
    const SESSION_TOKEN_KEY = "aryanta_admin_worker_session";
    const LOGIN_PAGE = "index.html";
    const $ = id => document.getElementById(id);

    let allLinks = [];
    let activeFilter = "all";
    let currentToast = null;
    let loading = false;

    function getToken() {
      return localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(SESSION_TOKEN_KEY) || "";
    }

    function authHeaders() {
      const token = getToken();
      return token ? { "Authorization": "Bearer " + token, "Content-Type": "application/json" } : { "Content-Type": "application/json" };
    }

    function syncAdminSettings() {
      if (!getToken()) {
        window.location.replace(LOGIN_PAGE);
        return false;
      }

      try {
        const savedSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
        const theme = savedSettings.theme || "light";
        const useDark = theme === "dark" || (theme === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", useDark ? "dark" : "light");
      } catch(e) {}

      return true;
    }

    function goPage(url) {
      window.location.href = url;
    }

    function escapeHtml(val) {
      return String(val ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function setText(id, value) {
      const el = $(id);
      if (el) el.textContent = value || "";
    }

    function showToast(message) {
      if (currentToast) currentToast.remove();
      const toast = document.createElement("div");
      toast.className = "toast show";
      toast.innerHTML = `<i class="fas fa-bell"></i><span>${escapeHtml(message)}</span>`;
      $("toastHolder").appendChild(toast);
      currentToast = toast;
      setTimeout(() => { toast.classList.remove("show"); setTimeout(() => toast.remove(), 220); }, 2600);
    }

    function setBusy(state) {
      loading = state;
      const icon = $("refreshIcon");
      if (icon) icon.className = state ? "spinner" : "fas fa-rotate";
    }

    function normalizeUrl(url) {
      url = String(url || "").trim();
      if (!url) return "";
      if (/^(https?:|mailto:|tel:|whatsapp:|sms:)/i.test(url)) return url;
      return "https://" + url.replace(/^\/+/, "");
    }

    function linkUrl(item) {
      return normalizeUrl(item.url || item.link || item.href || item.website || item.target || "");
    }

    function linkTitle(item) {
      return item.title || item.name || item.label || item.platform || "Untitled Link";
    }

    function linkLogo(item) {
      return item.logo || item.logoUrl || item.image || item.imageUrl || item.iconUrl || "";
    }

    function linkDesc(item) {
      return item.description || item.desc || item.note || "";
    }

    function isVisible(item) {
      if (!item || typeof item !== "object") return false;
      if (item.visible === false || item.isVisible === false || item.active === false || item.isActive === false) return false;
      if (item.deleted === true || item.removed === true || item.blocked === true) return false;
      const status = String(item.status || "active").toLowerCase();
      return !["hidden", "inactive", "deleted", "blocked", "disabled", "removed"].includes(status);
    }

    function platformOf(item) {
      const text = (linkTitle(item) + " " + linkUrl(item)).toLowerCase();

      if (text.includes("instagram")) return "instagram";
      if (text.includes("youtube") || text.includes("youtu.be")) return "youtube";
      if (text.includes("facebook") || text.includes("fb.com")) return "facebook";
      if (text.includes("whatsapp") || text.includes("wa.me")) return "whatsapp";
      if (text.includes("telegram") || text.includes("t.me")) return "telegram";
      if (text.includes("twitter") || text.includes("x.com")) return "x";
      if (text.includes("linkedin")) return "linkedin";
      if (text.includes("github")) return "github";
      if (text.includes("snapchat")) return "snapchat";
      if (text.includes("pinterest")) return "pinterest";
      if (text.includes("mail") || text.includes("mailto:")) return "email";
      if (text.includes("tel:") || text.includes("phone") || text.includes("call")) return "phone";
      return "web";
    }

    function isSocial(item) {
      return ["instagram", "youtube", "facebook", "whatsapp", "telegram", "x", "linkedin", "github", "snapchat", "pinterest"].includes(platformOf(item));
    }

    function iconFor(item) {
      const p = platformOf(item);
      if (p === "instagram") return "fab fa-instagram";
      if (p === "youtube") return "fab fa-youtube";
      if (p === "facebook") return "fab fa-facebook-f";
      if (p === "whatsapp") return "fab fa-whatsapp";
      if (p === "telegram") return "fab fa-telegram";
      if (p === "x") return "fab fa-x-twitter";
      if (p === "linkedin") return "fab fa-linkedin-in";
      if (p === "github") return "fab fa-github";
      if (p === "snapchat") return "fab fa-snapchat";
      if (p === "pinterest") return "fab fa-pinterest";
      if (p === "email") return "fas fa-envelope";
      if (p === "phone") return "fas fa-phone";
      return "fas fa-globe";
    }

    function typeLabel(item) {
      if (isSocial(item)) return "SOCIAL";
      if (platformOf(item) === "email") return "EMAIL";
      if (platformOf(item) === "phone") return "PHONE";
      return "WEB LINK";
    }

    function formatDateTime(value) {
      if (!value) return "Added recently";
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return "Added recently";
      return d.toLocaleString("en-IN", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    async function loadLinks() {
      if (loading) return;
      setBusy(true);
      setText("dbStatus", "Fetching securely...");

      try {
        const fromDb = await loadLinksFromFirebase();
        let finalLinks = fromDb;

        if (!finalLinks.length) {
          const fromWorker = await loadLinksFromWorker();
          finalLinks = fromWorker;
        }

        allLinks = finalLinks
          .filter(isVisible)
          .filter(item => linkUrl(item))
          .sort((a, b) => dateValue(b.createdAt || b.updatedAt) - dateValue(a.createdAt || a.updatedAt));

        setText("dbStatus", allLinks.length ? "Links Loaded" : "No Links Yet");
        renderLinks();
      } catch (err) {
        console.error(err);
        allLinks = [];
        setText("dbStatus", "DB Blocked");
        renderLinks();
        showToast("Unable to load links");
      } finally {
        setBusy(false);
      }
    }

    async function loadLinksFromFirebase() {
      const paths = ["links", "social_links", "admin_links"];
      const merged = [];

      for (const path of paths) {
        try {
          const snap = await db.ref(path).once("value");
          const data = snap.val() || {};
          if (Array.isArray(data)) {
            data.forEach((item, index) => {
              if (item) merged.push({ id: String(index), sourcePath: path, ...item });
            });
          } else {
            Object.keys(data).forEach(key => {
              if (data[key]) merged.push({ id: key, sourcePath: path, ...data[key] });
            });
          }
        } catch (e) {}
      }

      return uniqueLinks(merged);
    }

    async function loadLinksFromWorker() {
      const token = getToken();
      if (!token) return [];

      try {
        const res = await fetch(`${WORKER_URL}/admin/links?limit=500`, {
          headers: authHeaders()
        });

        const data = await res.json().catch(() => ({}));
        const rows = data.data || data.items || data.rows || data.links || [];
        return Array.isArray(rows) ? rows : [];
      } catch (e) {
        return [];
      }
    }

    function uniqueLinks(rows) {
      const seen = new Set();
      const out = [];

      rows.forEach(item => {
        const key = (linkUrl(item) + "|" + linkTitle(item)).toLowerCase();
        if (!key.trim() || seen.has(key)) return;
        seen.add(key);
        out.push(item);
      });

      return out;
    }

    function setFilter(filter) {
      activeFilter = filter;
      $("tabAll").classList.toggle("active", filter === "all");
      $("tabSocial").classList.toggle("active", filter === "social");
      $("tabWeb").classList.toggle("active", filter === "web");
      renderLinks();
    }

    function filteredLinks() {
      const q = ($("searchInput").value || "").trim().toLowerCase();

      return allLinks.filter(item => {
        const hay = `${linkTitle(item)} ${linkUrl(item)} ${linkDesc(item)} ${typeLabel(item)}`.toLowerCase();
        if (q && !hay.includes(q)) return false;
        if (activeFilter === "social" && !isSocial(item)) return false;
        if (activeFilter === "web" && isSocial(item)) return false;
        return true;
      });
    }

    function renderLinks() {
      const list = $("linkList");
      const items = filteredLinks();

      setText("listCount", `${items.length} ITEM${items.length === 1 ? "" : "S"}`);

      if (!items.length) {
        list.innerHTML = `
          <div class="empty">
            <div>
              <i class="fas fa-link"></i>
              <strong>No links found</strong>
              <span>Links added by admin will appear here.</span>
            </div>
          </div>`;
        return;
      }

      list.innerHTML = items.map((item, index) => {
        const title = linkTitle(item);
        const url = linkUrl(item);
        const logo = linkLogo(item);
        const label = typeLabel(item);
        const date = formatDateTime(item.createdAt || item.updatedAt);

        const logoHtml = logo
          ? `<img src="${escapeHtml(logo)}" alt="${escapeHtml(title)}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<i class=&quot;${iconFor(item)}&quot;></i>';" />`
          : `<i class="${iconFor(item)}"></i>`;

        return `
          <article class="link-item">
            <button class="link-logo" onclick="openLinkNow(${index})">${logoHtml}</button>
            <div class="link-main">
              <div class="link-meta">
                <strong>${escapeHtml(title)}</strong>
                <span>${escapeHtml(label)} • ${escapeHtml(date)}</span>
                <span>${escapeHtml(shortUrl(url))}</span>
              </div>
              <div class="link-actions">
                <button class="mini-action" onclick="previewLink(${index})"><i class="fas fa-eye"></i> View</button>
                <button class="mini-action success" onclick="openLinkNow(${index})"><i class="fas fa-up-right-from-square"></i> Open</button>
                <button class="mini-action" onclick="copyLink(${index})"><i class="fas fa-copy"></i></button>
              </div>
            </div>
          </article>`;
      }).join("");
    }

    function getRenderedItem(index) {
      return filteredLinks()[index];
    }

    function previewLink(index) {
      const item = getRenderedItem(index);
      if (!item) return;

      const title = linkTitle(item);
      const url = linkUrl(item);
      const logo = linkLogo(item);
      const desc = linkDesc(item);

      $("previewHead").textContent = title;
      $("previewTitle").textContent = title;
      $("previewUrl").textContent = url;
      $("previewDate").textContent = formatDateTime(item.createdAt || item.updatedAt);

      if (logo) {
        $("previewLogo").innerHTML = `<img src="${escapeHtml(logo)}" alt="${escapeHtml(title)}" onerror="this.parentElement.innerHTML='<i class=&quot;${iconFor(item)}&quot;></i>';" />`;
      } else {
        $("previewLogo").innerHTML = `<i class="${iconFor(item)}"></i>`;
      }

      if (desc) {
        $("previewDesc").style.display = "block";
        $("previewDesc").textContent = desc;
      } else {
        $("previewDesc").style.display = "none";
        $("previewDesc").textContent = "";
      }

      $("previewOpenBtn").onclick = () => openExternal(url);
      $("previewCopyBtn").onclick = () => copyText(url);
      openModal("previewModal");
    }

    function openLinkNow(index) {
      const item = getRenderedItem(index);
      if (!item) return;
      openExternal(linkUrl(item));
    }

    function openExternal(url) {
      url = normalizeUrl(url);
      if (!url) return showToast("No link found");
      window.open(url, "_blank", "noopener,noreferrer");
    }

    function copyLink(index) {
      const item = getRenderedItem(index);
      if (!item) return;
      copyText(linkUrl(item));
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("Link copied");
      } catch (e) {
        const input = document.createElement("input");
        input.value = text;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        input.remove();
        showToast("Link copied");
      }
    }

    function openAddModal() {
      $("linkTitleInput").value = "";
      $("linkUrlInput").value = "";
      $("linkLogoInput").value = "";
      $("linkDescInput").value = "";
      openModal("addModal");
    }

    async function saveLink(event) {
      event.preventDefault();

      const title = $("linkTitleInput").value.trim();
      const url = normalizeUrl($("linkUrlInput").value);
      const logo = $("linkLogoInput").value.trim();
      const description = $("linkDescInput").value.trim();

      if (!title || !url) return showToast("Title and link required");

      const payload = {
        id: safeId(title + "-" + Date.now()),
        title,
        url,
        link: url,
        logo,
        logoUrl: logo,
        description,
        active: true,
        visible: true,
        type: isSocial({ title, url }) ? "social" : "web",
        platform: platformOf({ title, url }),
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      $("saveBtn").disabled = true;
      $("saveBtn").innerHTML = `<span class="spinner"></span> Saving...`;

      try {
        let saved = false;

        try {
          const res = await fetch(`${WORKER_URL}/admin/links`, {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify(payload)
          });
          const data = await res.json().catch(() => ({}));
          saved = res.ok && data.success !== false;
        } catch (e) {}

        if (!saved) {
          await db.ref("links/" + payload.id).set(payload);
          saved = true;
        }

        closeModal("addModal");
        showToast("Link added");
        await loadLinks();
      } catch (err) {
        console.error(err);
        showToast("Link save failed");
      } finally {
        $("saveBtn").disabled = false;
        $("saveBtn").innerHTML = `<i class="fas fa-save"></i> Save Link`;
      }
    }

    function openModal(id) {
      $(id).classList.add("show");
    }

    function closeModal(id) {
      $(id).classList.remove("show");
    }

    function closeModalOnBackdrop(e, id) {
      if (e.target.id === id) closeModal(id);
    }

    function shortUrl(url) {
      try {
        const u = new URL(url);
        return u.hostname.replace(/^www\./, "") + (u.pathname && u.pathname !== "/" ? u.pathname.slice(0, 28) : "");
      } catch {
        return url.slice(0, 42);
      }
    }

    function dateValue(value) {
      if (!value) return 0;
      const d = new Date(value);
      return Number.isNaN(d.getTime()) ? 0 : d.getTime();
    }

    function safeId(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "")
        .slice(0, 80) || ("link-" + Date.now());
    }

    window.addEventListener("keydown", e => {
      if (e.key === "Escape") {
        closeModal("previewModal");
        closeModal("addModal");
      }
    });

    if (syncAdminSettings()) loadLinks();
  </script>
</body>
</html>
