<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Aryanta Reports</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  
  <!-- Firebase Compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --primary: #008080;
      --primary-dark: #006b6b;
      --primary-light: #00b8b8;
      --bg: #f4fbfb;
      --card: #ffffff;
      --card-soft: rgba(255, 255, 255, 0.86);
      --text: #101828;
      --muted: #667085;
      --border: #d9e7e7;
      --danger: #ef4444;
      --success: #16a34a;
      --warning: #f59e0b;
      --soft: rgba(0, 128, 128, 0.10);
      --shadow: 0 18px 45px rgba(16, 24, 40, 0.12);
      --shadow-soft: 0 8px 22px rgba(16, 24, 40, 0.08);
      --top-safe: max(14px, env(safe-area-inset-top));
      --bottom-safe: max(12px, env(safe-area-inset-bottom));
    }

    html[data-theme="dark"] {
      --bg: #081314; --card: #111d1f; --card-soft: rgba(17, 29, 31, 0.88);
      --text: #f8fafc; --muted: #98a2b3; --border: rgba(255, 255, 255, 0.12);
      --soft: rgba(0, 184, 184, 0.14); --shadow: 0 18px 45px rgba(0, 0, 0, 0.40);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { width: 100%; min-height: 100%; font-family: system-ui, -apple-system, sans-serif; color: var(--text); background: linear-gradient(160deg, #effafa 0%, #ffffff 45%, #e9f7f7 100%); overscroll-behavior: none; }
    html[data-theme="dark"] body { background: linear-gradient(160deg, #071112 0%, #101c1e 48%, #091718 100%); }
    button, input, select, textarea { font: inherit; outline: none; border: none; }
    button { cursor: pointer; touch-action: manipulation; transition: 0.15s; }
    button:active { transform: scale(0.96); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Hide scrollbar completely */
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    .fas, .fa-solid { display: inline-block !important; line-height: 1 !important; font-weight: 900 !important; }

    .app { width: 100%; min-height: 100dvh; padding: var(--top-safe) 12px calc(90px + var(--bottom-safe)); overflow-x: hidden; position: relative; isolation: isolate; }
    .app::before, .app::after { content: ""; position: fixed; border-radius: 999px; pointer-events: none; z-index: -1; }
    .app::before { width: 180px; height: 180px; top: -62px; right: -72px; background: rgba(0, 128, 128, 0.14); }
    .app::after { width: 170px; height: 170px; left: -70px; bottom: -60px; background: rgba(0, 184, 184, 0.12); }

    .wrap { width: 100%; max-width: 430px; margin: 0 auto; display: grid; gap: 12px; }

    /* TOPBAR */
    .topbar { min-height: 56px; display: grid; grid-template-columns: 45px minmax(0, 1fr) auto; align-items: center; gap: 9px; }
    .icon-btn { width: 45px; height: 45px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); color: var(--primary); box-shadow: var(--shadow-soft); display: inline-flex; align-items: center; justify-content: center; font-size: 16px; }

    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-logo { width: 44px; height: 44px; border-radius: 16px; padding: 4px; background: #ffffff; border: 1px solid var(--border); box-shadow: var(--shadow-soft); }
    .brand-logo img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }
    .brand h1 { font-size: 17px; font-weight: 950; color: var(--primary); }
    .brand p { color: var(--muted); font-size: 10px; font-weight: 900; text-transform: uppercase; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; box-shadow: var(--shadow-soft); overflow: hidden; padding: 16px;}
    .hero { background: linear-gradient(145deg, var(--primary-dark), var(--primary), var(--primary-light)); color: #ffffff; text-align: center; padding: 24px 16px; position: relative; }
    .hero h2 { font-size: 14px; font-weight: 800; opacity: 0.9; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px;}
    .hero .sub { font-size: 11px; opacity: 0.8; font-weight: 700; margin-top: 4px; }

    /* Tabs */
    .tabs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 7px; margin-bottom: 4px; }
    .tab { min-height: 38px; border-radius: 14px; background: var(--card-soft); border: 1px solid var(--border); color: var(--muted); display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 13px; font-weight: 800; }
    .tab.active { background: var(--primary); border-color: var(--primary); color: #ffffff; }

    .panel-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .panel-title h3 { font-size: 16px; font-weight: 900; display: flex; align-items: center; gap: 8px;}
    .panel-title h3 i { color: var(--primary); }
    .panel-title button { background: var(--soft); color: var(--primary); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 800; display: flex; gap: 6px; align-items: center;}

    /* List Layout */
    .list { display: grid; gap: 10px; }
    .report-card { background: var(--card-soft); border: 1px solid var(--border); border-radius: 20px; padding: 14px; display: grid; gap: 8px; cursor: pointer; transition: 0.15s; }
    .report-card:active { transform: scale(0.98); }
    
    .rep-header { display: flex; justify-content: space-between; align-items: center; }
    .rep-header strong { font-size: 15px; font-weight: 900; }
    .status-badge { padding: 4px 8px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    .status-badge.active { background: rgba(22, 163, 74, 0.15); color: var(--success); }
    .status-badge.pending { background: rgba(245, 158, 11, 0.15); color: var(--warning); }
    .status-badge.custom { background: var(--soft); color: var(--primary); }

    .rep-details-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 11.5px; color: var(--muted); font-weight: 700; margin-top: 4px;}
    .rep-details-grid span { color: var(--text); font-weight: 800; display: block; margin-top: 1px; }

    .rep-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px dashed var(--border); padding-top: 8px; margin-top: 4px; font-size: 10.5px; color: var(--muted); font-weight: 700; }

    /* Modals & Forms */
    .modal { position: fixed; inset: 0; z-index: 99999; display: none; align-items: center; justify-content: center; padding: 18px; background: rgba(0, 0, 0, 0.58); backdrop-filter: blur(5px); }
    .modal.show { display: flex; }
    .modal-card { width: min(430px, 100%); max-height: 86dvh; border-radius: 26px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); overflow: hidden; display: flex; flex-direction: column; }
    .modal-head { min-height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); flex: 0 0 auto;}
    .modal-body { padding: 16px; overflow: auto; display: grid; gap: 12px;}
    
    .field label { display: block; font-size: 11px; font-weight: 800; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .field input, .field select, .field textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-weight: 700; font-size: 14px;}
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--primary); }
    
    .btn-submit { width: 100%; padding: 14px; border-radius: 12px; background: linear-gradient(135deg, var(--primary-dark), var(--primary)); color: white; font-weight: 900; font-size: 15px; margin-top: 8px;}
    
    .modal-footer-row { display: flex; gap: 8px; width: 100%; margin-top: 8px; }
    .modal-footer-row button { flex: 1; padding: 12px; border-radius: 12px; font-weight: 850; font-size: 14px; }
    .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .btn-save { background: var(--primary); color: white; }

    /* BOTTOM NAV CSS */
    .bottom-nav { position: fixed; left: 12px; right: 12px; bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 20; height: 66px; border-radius: 24px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 7px; }
    .nav-btn { border-radius: 18px; background: transparent; color: var(--muted); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; transition: 0.2s ease; }
    .nav-btn .mini-mark { width: 26px; height: 26px; border-radius: 10px; font-size: 16px; display: flex; align-items: center; justify-content: center; }
    .nav-btn .btn-text { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: block !important; }
    .nav-btn.active { background: var(--soft); color: var(--primary); }

    /* TOAST */
    .toast-holder { position: fixed; left: 12px; right: 12px; top: calc(10px + env(safe-area-inset-top)); z-index: 9999; pointer-events: none; display: flex; justify-content: center; }
    .toast { width: min(430px, calc(100vw - 24px)); min-height: 45px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 10px 12px; display: flex; align-items: center; gap: 8px; color: var(--text); font-size: 12.5px; font-weight: 850; opacity: 0; transform: translateY(-14px); transition: 0.2s ease; pointer-events: auto; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast i { flex: 0 0 auto; }
    
    @media (min-width: 520px) { .bottom-nav { width: 430px; left: 50%; right: auto; transform: translateX(-50%); } }
  </style>
</head>
<body>
  <div id="toastHolder" class="toast-holder"></div>

  <main class="app">
    <div class="wrap">
      
      <!-- TOPBAR -->
      <header class="topbar">
        <button class="icon-btn" onclick="goPage('admin.html')"><i class="fas fa-arrow-left"></i></button>
        <div class="brand">
          <div class="brand-logo"><img src="https://aryanta.in/vurify/aryanta.jpeg" alt="Aryanta" /></div>
          <div>
            <h1>Aryanta</h1>
            <p>Verification Records</p>
          </div>
        </div>
        <div class="top-actions">
          <button class="icon-btn" onclick="fetchData()"><i id="refreshIcon" class="fas fa-rotate"></i></button>
        </div>
      </header>

      <!-- HERO -->
      <section class="card hero">
        <h2>Seller Verification Directory</h2>
        <div class="sub">Verify details, manage status records, and update pipeline databases</div>
      </section>

      <!-- TABS -->
      <div class="tabs">
        <button id="tabAll" class="tab active" onclick="setTab('all')"><i class="fas fa-border-all"></i> All Records</button>
        <button id="tabMy" class="tab" onclick="setTab('my')"><i class="fas fa-user-check"></i> My Uploads</button>
      </div>

      <!-- MAIN DIRECTORY PANEL -->
      <section class="card">
        <div class="panel-title">
          <h3><i class="fas fa-folder-open"></i> Verification Pipelines</h3>
          <button onclick="openModal('addReportModal')"><i class="fas fa-plus"></i> Add Record</button>
        </div>
        <div class="list" id="reportList">
          <div style="text-align: center; color: var(--muted); font-size: 12px; padding: 20px;">Loading pipeline data...</div>
        </div>
      </section>

    </div>
  </main>

  <!-- BOTTOM NAVIGATION -->
  <nav class="bottom-nav">
    <button class="nav-btn" onclick="goPage('admin.html')"><span class="mini-mark"><i class="fa-solid fa-house"></i></span><span class="btn-text">Home</span></button>
    <button class="nav-btn" onclick="goPage('admin.html#profile')"><span class="mini-mark"><i class="fa-solid fa-user"></i></span><span class="btn-text">Profile</span></button>
    <button class="nav-btn" onclick="goPage('chat.html')"><span class="mini-mark"><i class="fa-solid fa-comments"></i></span><span class="btn-text">Chat</span></button>
  </nav>

  <!-- ADD RECORD MODAL -->
  <div id="addReportModal" class="modal" onclick="closeModalOnBackdrop(event, 'addReportModal')">
    <div class="modal-card">
      <div class="modal-head">
        <strong style="font-size: 16px; font-weight: 900;">Add Seller Record</strong>
        <button class="icon-btn" style="color: var(--danger); background: var(--bg);" onclick="closeModal('addReportModal')"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>Seller / Client Name</label>
          <input type="text" id="addSellerName" placeholder="e.g. John Doe" />
        </div>
        <div class="field">
          <label>Phone Number / Mobile</label>
          <input type="tel" id="addMobile" placeholder="e.g. 9876543210" />
        </div>
        <div class="field">
          <label>Shop / Outlet Name</label>
          <input type="text" id="addShopName" placeholder="e.g. Aryanta Grocery" />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="addStatusSelect" onchange="toggleCustomStatus('add')">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="other">Other (Enter custom status)</option>
          </select>
        </div>
        <div class="field" id="addCustomStatusField" style="display: none;">
          <label>Custom Status Text</label>
          <input type="text" id="addCustomStatus" placeholder="Enter custom status state..." />
        </div>
        <div class="field">
          <label>Detailed Description</label>
          <textarea id="addDescription" rows="3" placeholder="Enter complete verification details..."></textarea>
        </div>
        <button class="btn-submit" onclick="submitReport()">Save Record to DB</button>
      </div>
    </div>
  </div>

  <!-- DETAILS & EDIT MODAL -->
  <div id="detailReportModal" class="modal" onclick="closeModalOnBackdrop(event, 'detailReportModal')">
    <div class="modal-card">
      <div class="modal-head">
        <strong style="font-size: 16px; font-weight: 900;">Verification Details</strong>
        <button class="icon-btn" style="color: var(--danger); background: var(--bg);" onclick="closeModal('detailReportModal')"><i class="fas fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editReportId" />
        
        <div class="field">
          <label>Seller / Client Name</label>
          <input type="text" id="editSellerName" />
        </div>
        <div class="field">
          <label>Phone Number / Mobile</label>
          <input type="tel" id="editMobile" />
        </div>
        <div class="field">
          <label>Shop / Outlet Name</label>
          <input type="text" id="editShopName" />
        </div>
        <div class="field">
          <label>Status</label>
          <select id="editStatusSelect" onchange="toggleCustomStatus('edit')">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="other">Other (Enter custom status)</option>
          </select>
        </div>
        <div class="field" id="editCustomStatusField" style="display: none;">
          <label>Custom Status Text</label>
          <input type="text" id="editCustomStatus" />
        </div>
        <div class="field">
          <label>Detailed Description</label>
          <textarea id="editDescription" rows="4"></textarea>
        </div>
        
        <!-- Action Row -->
        <div class="modal-footer-row" id="editActionRow">
          <button class="btn-delete" onclick="deleteReport()"><i class="fas fa-trash"></i> Delete</button>
          <button class="btn-save" onclick="updateReport()"><i class="fas fa-floppy-disk"></i> Save Changes</button>
        </div>
        <div style="display: none; text-align: center; color: var(--muted); font-size: 11px; font-weight: 700; margin-top: 10px;" id="readOnlyAlert">
          <i class="fas fa-lock"></i> Only the creator of this report or admins can modify it.
        </div>
      </div>
    </div>
  </div>

  <script>
    // --- SDK CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyBwOOlSdVEgGiUdrr4thPRvILNLcLnfqbc",
      authDomain: "aryanta.firebaseapp.com",
      databaseURL: "https://aryanta-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "aryanta",
      storageBucket: "aryanta.firebasestorage.app",
      messagingSenderId: "1072021816522",
      appId: "1:1072021816522:web:8f831cf4d61a7b0f8de033"
    };

    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();

    const SETTINGS_KEY = "aryanta_admin_settings";
    const TOKEN_KEY = "aryanta_admin_worker_token";
    const SESSION_TOKEN_KEY = "aryanta_admin_worker_session";
    const PROFILE_KEY = "aryanta_admin_profile";
    const LOGIN_PAGE = "index.html";

    let reports = [];
    let currentToast = null;
    let activeTab = 'all';

    const currentUser = JSON.parse(sessionStorage.getItem(PROFILE_KEY) || "{}");
    const userUid = currentUser.uid || "";
    const userName = currentUser.name || "User";
    const isAdmin = currentUser.role === "Admin";

    const $ = id => document.getElementById(id);

    // --- SECURE BOOT ---
    function getToken() { return localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(SESSION_TOKEN_KEY) || ""; }
    function goPage(url) { window.location.href = url; }
    function escapeHtml(val) { return String(val ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function formatDate(iso) { 
      if(!iso) return "Recently added";
      const d = new Date(iso); 
      return d.toLocaleDateString("en-IN", { day: '2-digit', month: 'short', year: 'numeric' }); 
    }

    function initApp() {
      if(!getToken()) { window.location.replace(LOGIN_PAGE); return; }
      
      try {
        const savedSettings = JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {};
        const theme = savedSettings.theme || "light";
        const useDark = theme === "dark" || (theme === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.setAttribute("data-theme", useDark ? "dark" : "light");
      } catch(e) {}
    }

    function showToast(message, type = "info") {
      if (currentToast) { currentToast.remove(); }
      const toast = document.createElement("div");
      toast.className = "toast show";
      
      let icon = "fa-bell";
      let color = "var(--primary)";
      if(type === "error") { icon = "fa-circle-exclamation"; color = "var(--danger)"; }
      if(type === "success") { icon = "fa-circle-check"; color = "var(--success)"; }

      toast.innerHTML = `<i class="fas ${icon}" style="color: ${color}"></i><span>${escapeHtml(message)}</span>`;
      $("toastHolder").appendChild(toast);
      currentToast = toast;
      setTimeout(() => { toast.classList.remove("show"); setTimeout(()=>toast.remove(), 220); }, 2600);
    }

    function openModal(id) { $(id).classList.add("show"); }
    function closeModal(id) { $(id).classList.remove("show"); }
    function closeModalOnBackdrop(event, id) { if (event.target.id === id) closeModal(id); }

    // Dropdown input switch helper
    function toggleCustomStatus(prefix) {
      const select = $(`${prefix}StatusSelect`);
      const customField = $(`${prefix}CustomStatusField`);
      if (select.value === "other") {
        customField.style.display = "block";
      } else {
        customField.style.display = "none";
      }
    }

    // --- TAB LOGIC ---
    function setTab(tab) {
      activeTab = tab;
      $("tabAll").classList.toggle("active", tab === 'all');
      $("tabMy").classList.toggle("active", tab === 'my');
      renderReports();
    }

    // --- SECURE DB SYNC ---
    async function fetchData() {
      const icon = $("refreshIcon");
      icon.classList.add("fa-spin");
      try {
        const snap = await db.ref('reports').once('value');
        const data = snap.val() || {};

        reports = Object.keys(data).map(k => ({ id: k, ...data[k] })).sort((a,b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
        renderReports();
      } catch (err) {
        showToast("Error loading verification database", "error");
      } finally {
        icon.classList.remove("fa-spin");
      }
    }

    // --- REPORT CRUD ---
    async function submitReport() {
      const sellerName = $("addSellerName").value.trim();
      const mobile = $("addMobile").value.trim();
      const shopName = $("addShopName").value.trim();
      const desc = $("addDescription").value.trim();
      
      const selectVal = $("addStatusSelect").value;
      const customVal = $("addCustomStatus").value.trim();
      const finalStatus = selectVal === "other" ? (customVal || "Pending") : selectVal;

      // Make sure all fields are verified
      if(!sellerName || !mobile || !shopName || !desc) {
        return showToast("Fill all validation parameters!", "error");
      }

      const payload = {
        sellerName,
        mobile,
        shopName,
        description: desc,
        status: finalStatus,
        uid: userUid,
        userName: userName,
        createdAt: new Date().toISOString()
      };

      try {
        await db.ref('reports').push(payload);
        closeModal("addReportModal");
        
        // Reset Inputs
        $("addSellerName").value = ""; $("addMobile").value = ""; $("addShopName").value = "";
        $("addDescription").value = ""; $("addCustomStatus").value = ""; $("addStatusSelect").value = "active";
        $("addCustomStatusField").style.display = "none";

        showToast("Record successfully logged in DB", "success");
        fetchData();
      } catch(e) {
        showToast("Failed to save report record", "error");
      }
    }

    function renderReports() {
      let html = "";
      const list = $("reportList");

      const filtered = reports.filter(r => {
        if (activeTab === 'my') return r.uid === userUid;
        return true;
      });

      if(filtered.length === 0) {
        list.innerHTML = `<div style="text-align:center; padding:15px; color:var(--muted); font-size:12px; font-weight:800;">No verification records found</div>`;
        return;
      }

      filtered.forEach(r => {
        const isCustom = r.status !== 'active' && r.status !== 'pending';
        const badgeClass = isCustom ? 'custom' : r.status;
        
        html += `
          <div class="report-card" onclick="openDetailsModal('${r.id}')">
            <div class="rep-header">
              <strong>${escapeHtml(r.shopName)}</strong>
              <span class="status-badge ${badgeClass}">${escapeHtml(r.status)}</span>
            </div>
            <div class="rep-details-grid">
              <div>Seller Name: <span>${escapeHtml(r.sellerName)}</span></div>
              <div>Phone/Mobile: <span>${escapeHtml(r.mobile)}</span></div>
            </div>
            <div class="rep-footer">
              <span>Logged by: ${escapeHtml(r.userName || "Admin")}</span>
              <span>${formatDate(r.createdAt)}</span>
            </div>
          </div>
        `;
      });

      list.innerHTML = html;
    }

    function openDetailsModal(id) {
      const r = reports.find(x => x.id === id);
      if(!r) return;

      $("editReportId").value = id;
      $("editSellerName").value = r.sellerName || "";
      $("editMobile").value = r.mobile || "";
      $("editShopName").value = r.shopName || "";
      $("editDescription").value = r.description || "";

      // Setup Status Dropdowns
      if (r.status === 'active' || r.status === 'pending') {
        $("editStatusSelect").value = r.status;
        $("editCustomStatusField").style.display = "none";
      } else {
        $("editStatusSelect").value = "other";
        $("editCustomStatus").value = r.status;
        $("editCustomStatusField").style.display = "block";
      }

      // Check Ownership & Admin Privileges
      const isCreator = r.uid === userUid;
      if (isCreator || isAdmin) {
        $("editActionRow").style.display = "flex";
        $("readOnlyAlert").style.display = "none";
        setFormDisabledState(false);
      } else {
        $("editActionRow").style.display = "none";
        $("readOnlyAlert").style.display = "block";
        setFormDisabledState(true);
      }

      openModal("detailReportModal");
    }

    function setFormDisabledState(state) {
      $("editSellerName").disabled = state;
      $("editMobile").disabled = state;
      $("editShopName").disabled = state;
      $("editDescription").disabled = state;
      $("editStatusSelect").disabled = state;
      $("editCustomStatus").disabled = state;
    }

    async function updateReport() {
      const id = $("editReportId").value;
      const sellerName = $("editSellerName").value.trim();
      const mobile = $("editMobile").value.trim();
      const shopName = $("editShopName").value.trim();
      const desc = $("editDescription").value.trim();

      const selectVal = $("editStatusSelect").value;
      const customVal = $("editCustomStatus").value.trim();
      const finalStatus = selectVal === "other" ? (customVal || "Pending") : selectVal;

      if(!sellerName || !mobile || !shopName || !desc) {
         return showToast("Fill all validation parameters", "error");
      }

      try {
        await db.ref(`reports/${id}`).update({
          sellerName, mobile, shopName, description: desc, status: finalStatus
        });
        closeModal("detailReportModal");
        showToast("Record successfully updated", "success");
        fetchData();
      } catch(e) {
        showToast("Database synchronization failed", "error");
      }
    }

    async function deleteReport() {
      if(!confirm("Permanently delete this verification record?")) return;
      const id = $("editReportId").value;
      try {
        await db.ref(`reports/${id}`).remove();
        closeModal("detailReportModal");
        showToast("Record removed from DB", "success");
        fetchData();
      } catch(e) {
        showToast("Delete operation failed", "error");
      }
    }

    // Initialize
    initApp();
    fetchData();
  </script>
</body>
</html>
