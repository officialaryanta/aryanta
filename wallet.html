<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aryanta Pay | Premium Wallet</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-database-compat.js"></script>

    <style>
        :root { --brand: #5f259f; --brand-light: #7e3af2; --bg: #f8fafc; --surface: #ffffff; --text: #0f172a; --border: #e2e8f0; --success: #10b981; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); padding-bottom: 50px; }

        /* Navigation */
        .top-nav { height: 70px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 900; font-size: 22px; color: var(--brand); letter-spacing: -1px; }

        /* Wallet Card */
        .main-container { max-width: 500px; margin: 0 auto; padding: 20px; }
        .balance-card { background: linear-gradient(135deg, #5f259f, #8b5cf6); border-radius: 24px; padding: 30px; color: white; margin-bottom: 25px; box-shadow: 0 15px 35px rgba(95, 37, 159, 0.2); }
        .bal-label { font-size: 12px; font-weight: 800; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .bal-value { font-size: 42px; font-weight: 900; margin: 5px 0 20px; }
        .wallet-id { background: rgba(255,255,255,0.15); padding: 8px 15px; border-radius: 100px; font-size: 13px; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }

        /* Main Action Grid */
        .action-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 30px; }
        .action-item { background: white; border-radius: 18px; padding: 15px 5px; text-align: center; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .action-item:active { transform: scale(0.95); }
        .action-item i { font-size: 20px; color: var(--brand); margin-bottom: 8px; }
        .action-item span { display: block; font-size: 10px; font-weight: 800; color: #64748b; }

        /* Digital Vouchers */
        .section-title { font-size: 16px; font-weight: 900; margin: 25px 0 15px; display: flex; align-items: center; gap: 8px; }
        .voucher-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .voucher-item { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 15px 10px; text-align: center; cursor: pointer; }
        .voucher-item img { width: 35px; height: 35px; object-fit: contain; margin-bottom: 8px; }
        .voucher-item span { display: block; font-size: 11px; font-weight: 700; color: var(--text); }

        /* Overlays */
        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; }
        .overlay.active { transform: translateX(0); }
        .overlay-header { padding: 20px; background: white; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; position: sticky; top: 0; }
        .overlay-body { padding: 25px; }

        /* Inputs & Buttons */
        .m-input { width: 100%; padding: 16px; border-radius: 14px; border: 2px solid var(--border); font-size: 16px; font-weight: 700; margin-bottom: 15px; outline: none; transition: 0.3s; }
        .m-input:focus { border-color: var(--brand); background: #f5f3ff; }
        .btn-pay { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--brand); color: white; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(95, 37, 159, 0.1); }

        .hist-card { background: white; padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        #reader { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="logo">ARYANTA<span>PAY</span></div>
        <i class="fas fa-circle-user" style="font-size: 26px; color: var(--brand);"></i>
    </nav>

    <div class="main-container">
        <div class="balance-card">
            <p class="bal-label">Wallet Balance</p>
            <h1 class="bal-value" id="dispBal">₹0.00</h1>
            <div class="wallet-id" onclick="copyMyID()">
                <i class="fas fa-wallet"></i> <span id="dispID">Syncing...</span> <i class="far fa-copy" style="opacity:0.5;"></i>
            </div>
            <button onclick="openPage('pageAdd')" style="width:100%; margin-top:20px; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.4); background:transparent; color:white; font-weight:700; cursor:pointer;">+ Add Money</button>
        </div>

        <div class="action-grid">
            <div class="action-item" onclick="startScanner()"><i class="fas fa-qrcode"></i><span>Scan QR</span></div>
            <div class="action-item" onclick="openPage('pageSend')"><i class="fas fa-paper-plane"></i><span>Send Money</span></div>
            <div class="action-item" onclick="openPage('pageRedeem')"><i class="fas fa-gift"></i><span>Redeem Gift</span></div>
            <div class="action-item" onclick="openPage('pageVoucher')"><i class="fas fa-ticket"></i><span>Create Voucher</span></div>
            <div class="action-item" onclick="alert('Bank Transfer: Coming Soon')"><i class="fas fa-university"></i><span>To Bank</span></div>
            <div class="action-item" onclick="openPage('pageHistory')"><i class="fas fa-history"></i><span>History</span></div>
            <div class="action-item" onclick="openPage('pagePin')"><i class="fas fa-lock"></i><span>Security PIN</span></div>
            <div class="action-item" onclick="alert('More Services')"><i class="fas fa-grid"></i><span>More</span></div>
        </div>

        <h3 class="section-title"><i class="fas fa-shopping-cart"></i> Digital Vouchers</h3>
        <div class="voucher-grid" id="voucherGrid">
            </div>

        <h3 class="section-title"><i class="fas fa-bolt"></i> Bill Payments</h3>
        <div class="voucher-grid">
            <div class="voucher-item" style="opacity:0.6;"><i class="fas fa-mobile-screen" style="font-size:24px; color:var(--brand);"></i><br><span>Mobile Recharge</span></div>
            <div class="voucher-item" style="opacity:0.6;"><i class="fas fa-wifi" style="font-size:24px; color:var(--brand);"></i><br><span>Broadband</span></div>
            <div class="voucher-item" style="opacity:0.6;"><i class="fas fa-lightbulb" style="font-size:24px; color:var(--brand);"></i><br><span>Electricity</span></div>
        </div>
    </div>

    <div id="pageAdd" class="overlay">
        <div class="overlay-header"><i class="fas fa-arrow-left" onclick="closePage('pageAdd')"></i><h3>Add Funds</h3></div>
        <div class="overlay-body">
            <input type="number" id="addAmt" class="m-input" placeholder="Amount (₹)">
            <button class="btn-pay" onclick="payWithRazorpay()">Pay via Razorpay</button>
        </div>
    </div>

    <div id="pageRedeem" class="overlay">
        <div class="overlay-header"><i class="fas fa-arrow-left" onclick="closePage('pageRedeem')"></i><h3>Redeem Voucher</h3></div>
        <div class="overlay-body">
            <input type="text" id="redCode" class="m-input" placeholder="Enter Gift Code (e.g. ARY-XXXX)">
            <input type="password" id="redPin" class="m-input" placeholder="Enter 4-Digit PIN" maxlength="4">
            <button class="btn-pay" onclick="redeemVoucher()">Verify & Redeem</button>
        </div>
    </div>

    <div id="pageVoucher" class="overlay">
        <div class="overlay-header"><i class="fas fa-arrow-left" onclick="closePage('pageVoucher')"></i><h3>Create Voucher</h3></div>
        <div class="overlay-body">
            <input type="number" id="vouchAmt" class="m-input" placeholder="Voucher Value (₹)">
            <input type="password" id="vouchPin" class="m-input" placeholder="Set 4-Digit Security PIN" maxlength="4">
            <button class="btn-pay" onclick="processCreateVoucher()">Generate Voucher</button>
        </div>
    </div>

    <div id="pageSend" class="overlay">
        <div class="overlay-header"><i class="fas fa-arrow-left" onclick="closePage('pageSend')"></i><h3>Send Money</h3></div>
        <div class="overlay-body">
            <input type="text" id="targetID" class="m-input" placeholder="Recipient Wallet ID">
            <input type="number" id="sendAmt" class="m-input" placeholder="Amount (₹)">
            <button class="btn-pay" onclick="sendMoney()">Transfer Now</button>
        </div>
    </div>

    <div id="pageHistory" class="overlay">
        <div class="overlay-header"><i class="fas fa-arrow-left" onclick="closePage('pageHistory')"></i><h3>Transaction History</h3></div>
        <div class="overlay-body" id="histList"></div>
    </div>

    <script>
        // 1. Config
        const rzpKey = "rzp_test_Sh3VV40UnZbbVd";
        const firebaseConfig = {
            apiKey: "AIzaSyA2LFjhw79KbX8uAToobgj732aYOsuy74k",
            authDomain: "vote-3df4d.firebaseapp.com",
            databaseURL: "https://vote-3df4d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "vote-3df4d",
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const session = JSON.parse(localStorage.getItem('active_session'));
        if(!session) window.location.href="index.html";
        const safeE = session.email.replace(/[.#$\[\]]/g, '_');

        let myBal = 0;
        let myID = "";

        // UI Helpers
        function openPage(id) { document.getElementById(id).classList.add('active'); }
        function closePage(id) { document.getElementById(id).classList.remove('active'); }
        function copyMyID() { navigator.clipboard.writeText(myID); alert("ID Copied!"); }

        // Render Vouchers
        const svcs = ["Play Store", "Steam Wallet", "Domino's", "Amazon Pay", "Flipkart", "Swiggy", "Zomato", "BookMyShow", "Myntra", "Uber", "Spotify", "Netflix", "Hotstar", "App Store", "SonyLIV"];
        const vGrid = document.getElementById('voucherGrid');
        svcs.forEach(s => {
            vGrid.innerHTML += `
                <div class="voucher-item" onclick="alert('Buying ${s} Gift Card...')">
                    <img src="https://cdn-icons-png.flaticon.com/128/300/300220.png" style="filter: hue-rotate(${Math.random()*360}deg);">
                    <span>${s}</span>
                </div>
            `;
        });

        // 2. Data Logic
        function initApp() {
            db.ref('users/' + safeE).on('value', snap => {
                const data = snap.val();
                if(data) {
                    myBal = data.walletBalance || 0;
                    myID = data.walletAddress;
                    document.getElementById('dispBal').innerText = `₹${myBal.toLocaleString('en-IN', {minimumFractionDigits:2})}`;
                    document.getElementById('dispID').innerText = myID;
                }
            });

            db.ref('users/' + safeE + '/transactions').on('value', snap => {
                const list = document.getElementById('histList');
                list.innerHTML = "";
                snap.forEach(child => {
                    const t = child.val();
                    list.innerHTML += `
                        <div class="hist-card">
                            <div><div style="font-weight:800;">${t.desc}</div><div style="font-size:11px; color:#64748b;">${new Date(t.date).toLocaleString()}</div></div>
                            <div style="font-weight:900; color:${t.type=='credit'?'#10b981':'#0f172a'}">₹${t.amount}</div>
                        </div>
                    `;
                });
            });
        }

        // 3. RAZORPAY TOPUP
        function payWithRazorpay() {
            const amt = document.getElementById('addAmt').value;
            if(amt < 1) return alert("Enter valid amount");

            const options = {
                "key": rzpKey,
                "amount": amt * 100,
                "name": "Aryanta Pay",
                "description": "Wallet Top-up",
                "handler": function (response) {
                    const newBal = parseFloat(myBal) + parseFloat(amt);
                    db.ref('users/' + safeE).update({ walletBalance: newBal });
                    db.ref('users/' + safeE + '/transactions').push({
                        type: 'credit', amount: amt, desc: 'Added via Razorpay', date: Date.now()
                    });
                    alert("Added Successfully!");
                    closePage('pageAdd');
                }
            };
            const rzp = new Razorpay(options);
            rzp.open();
        }

        // 4. VOUCHER CREATION
        function processCreateVoucher() {
            const amt = parseFloat(document.getElementById('vouchAmt').value);
            const pin = document.getElementById('vouchPin').value;
            if(amt > myBal) return alert("Insufficient Balance");
            if(pin.length !== 4) return alert("Set a 4-Digit PIN");

            const code = "ARY-" + Math.random().toString(36).substr(2, 6).toUpperCase();
            
            db.ref('vouchers/' + code).set({
                code: code, amount: amt, pin: pin, status: 'active', creator: session.name
            });
            db.ref('users/' + safeE).update({ walletBalance: myBal - amt });
            db.ref('users/' + safeE + '/transactions').push({
                type: 'debit', amount: amt, desc: `Created Voucher: ${code}`, date: Date.now()
            });

            alert(`Voucher Created!\nCode: ${code}\nPIN: ${pin}`);
            closePage('pageVoucher');
        }

        // 5. REDEEM VOUCHER (PIN Required)
        async function redeemVoucher() {
            const code = document.getElementById('redCode').value.trim();
            const pin = document.getElementById('redPin').value.trim();

            const snap = await db.ref('vouchers/' + code).once('value');
            if(!snap.exists()) return alert("Invalid Voucher Code");

            const data = snap.val();
            if(data.status !== 'active') return alert("Voucher already used");
            if(data.pin !== pin) return alert("Incorrect Security PIN");

            // Success
            const val = data.amount;
            db.ref('vouchers/' + code).update({ status: 'used', redeemedBy: session.name });
            db.ref('users/' + safeE).update({ walletBalance: myBal + val });
            db.ref('users/' + safeE + '/transactions').push({
                type: 'credit', amount: val, desc: `Redeemed Voucher ${code}`, date: Date.now()
            });

            alert(`Successfully Redeemed ₹${val}!`);
            closePage('pageRedeem');
        }

        // 6. SEND MONEY
        async function sendMoney() {
            const target = document.getElementById('targetID').value.trim();
            const amt = parseFloat(document.getElementById('sendAmt').value);
            if(amt > myBal) return alert("Insufficient Balance");

            const snap = await db.ref('users').orderByChild('walletAddress').equalTo(target).once('value');
            if(snap.exists()) {
                const recKey = Object.keys(snap.val())[0];
                const recData = snap.val()[recKey];
                
                db.ref('users/' + safeE).update({ walletBalance: myBal - amt });
                db.ref('users/' + recKey).update({ walletBalance: (recData.walletBalance || 0) + amt });
                
                db.ref('users/'+safeE+'/transactions').push({ type: 'debit', amount: amt, desc: `Sent to ${recData.name}`, date: Date.now() });
                db.ref('users/'+recKey+'/transactions').push({ type: 'credit', amount: amt, desc: `Received from ${session.name}`, date: Date.now() });
                
                alert("Transfer Successful!");
                closePage('pageSend');
            } else {
                alert("User Not Found");
            }
        }

        initApp();
    </script>
</body>
</html>
