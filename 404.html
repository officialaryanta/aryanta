<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aryanta|Page Not Found </title>
    <style>
        :root {
            --primary-bg: #ffffff;
            --text-main: #202124;
            --text-secondary: #5f6368;
            --accent-blue: #1a73e8;
            --prime-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --search-border: #dfe1e5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Strict no-scroll */
            padding: 20px;
        }

        /* Branding Section */
        .brand-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .aryanta-logo {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: 24px; /* Curved Prime Look */
            box-shadow: var(--prime-shadow);
            margin-bottom: 15px;
            border: 2px solid #f8f9fa;
        }

        .brand-name {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: -1px;
            color: #000;
        }

        .brand-name span {
            color: var(--accent-blue);
        }

        /* Search Bar UI */
        .search-prime {
            width: 100%;
            max-width: 584px;
            height: 54px;
            border: 1px solid var(--search-border);
            border-radius: 27px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            margin-bottom: 30px;
            background: #fff;
            transition: box-shadow 0.2s ease;
        }

        .search-prime:hover {
            box-shadow: 0 1px 6px rgba(32,33,36,.28);
            border-color: rgba(223,225,229,0);
        }

        .search-icon {
            width: 20px;
            height: 20px;
            fill: #9aa0a6;
            margin-right: 15px;
            flex-shrink: 0;
        }

        .search-text {
            flex-grow: 1;
            font-size: 16px;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-text b {
            color: var(--accent-blue);
        }

        /* Error Messaging */
        .error-message {
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            margin-bottom: 12px;
        }

        p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Prime Button */
        .cta-button {
            display: inline-block;
            text-decoration: none;
            background-color: #000;
            color: #fff;
            padding: 14px 40px;
            border-radius: 100px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 14px rgba(0,0,0,0.25);
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            background-color: #222;
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            .brand-name { font-size: 28px; }
            .aryanta-logo { width: 80px; height: 80px; }
            h1 { font-size: 20px; }
            .search-prime { height: 48px; }
        }
    </style>
</head>
<body>

    <!-- Header Branding -->
    <div class="brand-container">
        <img src="https://aryanta.in/vurify/aryanta.jpeg" alt="Aryanta" class="aryanta-logo">
        <div class="brand-name">Aryanta</div>
    </div>

    <!-- Prime Search UI -->
    <div class="search-prime">
        <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
        </svg>
        <div class="search-text" id="url-display">Error <b>404</b>: Page not found</div>
    </div>

    <!-- Error Description -->
    <div class="error-message">
        <h1>That’s an error.</h1>
        <p>The requested URL was not found on our servers.</p>
        
        <!-- Action Button -->
        <a href="https://aryanta.in" class="cta-button">RETURN TO HOME</a>
    </div>

    <script>
        // Dynamically get the requested URL path
        window.onload = function() {
            const path = window.location.pathname;
            const displayElement = document.getElementById('url-display');
            if (path && path !== '/' && path !== '/404.html') {
                displayElement.innerHTML = `Error <b>404</b>: <u>${path}</u> not found`;
            }
        };
    </script>
</body>
</html>
